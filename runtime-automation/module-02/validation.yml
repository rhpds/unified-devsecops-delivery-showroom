---
# Module 2 — run existing validate-module-2.sh on bastion
- name: Build SSH inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - ansible.builtin.add_host:
        name: bastion
        ansible_host: "{{ bastion_host }}"
        ansible_port: "{{ bastion_port | default(22) }}"
        ansible_user: "{{ student_user }}"
        ansible_password: "{{ bastion_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

- name: Module 2 Validation — run validate-module-2.sh on bastion
  hosts: bastion
  gather_facts: false
  tasks:
    - name: Run validate-module-2.sh
      ansible.builtin.shell: |
        bash $HOME/lab-assets/validate-module-2.sh
      register: r_validate
      ignore_errors: true

    - name: Show output
      ansible.builtin.debug:
        msg: "{{ r_validate.stdout }}"

    - name: Fail if validation failed
      ansible.builtin.fail:
        msg: "Module 2 validation failed"
      when: r_validate.rc != 0
