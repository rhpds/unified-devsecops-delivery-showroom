---
# STEP 1.4: Deleting Keycloak clients and realm
- name: "Step 4: Deleting Keycloak clients and realm"
  ansible.builtin.debug:
    msg: "Step 4: Deleting Keycloak clients and realm..."

- name: Get Keycloak admin token
  ansible.builtin.uri:
    url: "{{ keycloak_admin_console }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      client_id: admin-cli
      username: "{{ keycloak_admin_user }}"
      password: "{{ keycloak_admin_password }}"
      grant_type: password
    validate_certs: false
    status_code: [200]
    return_content: true
  register: admin_token_response
  changed_when: false
  failed_when: false

- name: Set admin token
  ansible.builtin.set_fact:
    admin_token: "{{ admin_token_response.json.access_token | default('') }}"
  when: admin_token_response.status is defined and admin_token_response.status == 200

- name: Process Keycloak client and realm deletion
  when: admin_token is defined and admin_token != "" and admin_token != "null"
  block:
    - name: Get trusted-artifact-signer client ID from sso realm
      ansible.builtin.uri:
        url: "{{ keycloak_admin_console }}/admin/realms/{{ tas_sso_realm }}/clients?clientId={{ tas_client_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ admin_token }}"
        validate_certs: false
        status_code: [200]
        return_content: true
      register: sso_client_response
      changed_when: false

    - name: Set sso client ID
      ansible.builtin.set_fact:
        sso_client_id: "{{ (sso_client_response.json | first).id if sso_client_response.json | length > 0 else '' }}"

    - name: Delete trusted-artifact-signer client from sso realm
      when: sso_client_id != ""
      block:
        - name: Delete client from sso realm
          ansible.builtin.uri:
            url: "{{ keycloak_admin_console }}/admin/realms/{{ tas_sso_realm }}/clients/{{ sso_client_id }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ admin_token }}"
            validate_certs: false
            status_code: [204]
          changed_when: true

        - name: Verify client deletion from sso realm
          ansible.builtin.uri:
            url: "{{ keycloak_admin_console }}/admin/realms/{{ tas_sso_realm }}/clients?clientId={{ tas_client_id }}"
            method: GET
            headers:
              Authorization: "Bearer {{ admin_token }}"
            validate_certs: false
            status_code: [200]
            return_content: true
          register: verify_sso_client_response
          changed_when: false

        - name: Set verify client ID
          ansible.builtin.set_fact:
            verify_sso_client: "{{ (verify_sso_client_response.json | first).id if verify_sso_client_response.json | length > 0 else '' }}"

        - name: Display client deletion result
          ansible.builtin.debug:
            msg: "{{ '✓ Deleted ' + tas_client_id + ' client from ' + tas_sso_realm + ' realm' if verify_sso_client == '' else 'Warning: ' + tas_client_id + ' client still exists in ' + tas_sso_realm + ' realm' }}"

    - name: Display client not found in sso realm
      when: sso_client_id == ""
      ansible.builtin.debug:
        msg: "✓ {{ tas_client_id }} client not found in {{ tas_sso_realm }} realm"

    - name: Check if tas-chains realm exists
      ansible.builtin.uri:
        url: "{{ keycloak_admin_console }}/admin/realms/{{ tas_chains_realm }}"
        method: GET
        headers:
          Authorization: "Bearer {{ admin_token }}"
        validate_certs: false
        status_code: [200, 404]
      register: realm_exists_response
      changed_when: false

    - name: Delete tas-chains realm
      when: realm_exists_response.status == 200
      block:
        - name: Delete realm
          ansible.builtin.uri:
            url: "{{ keycloak_admin_console }}/admin/realms/{{ tas_chains_realm }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ admin_token }}"
            validate_certs: false
            status_code: [204]
          changed_when: true

        - name: Verify realm deletion
          ansible.builtin.uri:
            url: "{{ keycloak_admin_console }}/admin/realms/{{ tas_chains_realm }}"
            method: GET
            headers:
              Authorization: "Bearer {{ admin_token }}"
            validate_certs: false
            status_code: [200, 404]
          register: verify_realm_response
          changed_when: false

        - name: Display realm deletion result
          ansible.builtin.debug:
            msg: "{{ '✓ Deleted ' + tas_chains_realm + ' realm' if verify_realm_response.status == 404 else 'Warning: ' + tas_chains_realm + ' realm still exists' }}"

    - name: Display realm not found
      when: realm_exists_response.status != 200
      ansible.builtin.debug:
        msg: "✓ {{ tas_chains_realm }} realm not found"

- name: Display warning if Keycloak auth failed
  when: admin_token is not defined or admin_token == "" or admin_token == "null"
  ansible.builtin.debug:
    msg: "Warning: Failed to authenticate with Keycloak, skipping client/realm deletion"
