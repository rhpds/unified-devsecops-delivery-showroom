---
# Module 2: Install RHTAS and Test Image Signing
# Translates: solve-module-2.sh (exact implementation from scripts)
# Based on: reset-module-2.sh + install-rhtas.sh + test-image-signing.sh
- name: Solve Module 02 - RHTAS Installation
  hosts: localhost
  gather_facts: false

  vars:
    # Variables from user_data.yml (injected via -e @/user_data/user_data.yml)
    cluster_domain: "{{ openshift_cluster_ingress_domain }}"
    quay_token: "{{ quay_admin_token }}"

    # Static variables
    keycloak_namespace: "tssc-keycloak"
    tas_namespace: "tssc-tas"
    pipelines_namespace: "openshift-pipelines"
    app_ci_namespace: "tssc-app-ci"
    quay_namespace: "quay-enterprise"
    tas_chains_realm: "tas-chains"
    tas_sso_realm: "sso"
    tas_client_id: "trusted-artifact-signer"
    quay_org: "tssc"
    quay_repo: "tekton-chains-test"
    lab_assets_dir: "/home/lab-user/lab-assets"
    test_sa: "chains-signing-image-tester"
    registry_secret: "tssc-image-registry-auth"

  module_defaults:
    group/kubernetes.core.k8s:
      host: "{{ openshift_api_server_url }}"
      api_key: "{{ (lookup('file', k8s_kubeconfig) | from_yaml).users[0].user.token }}"
      validate_certs: false

  tasks:
    - name: Add bastion host to inventory
      ansible.builtin.add_host:
        name: "bastion"
        ansible_host: "{{ bastion_public_hostname }}"
        ansible_user: "{{ bastion_ssh_user_name }}"
        ansible_ssh_pass: "{{ bastion_ssh_password }}"
        ansible_port: "{{ bastion_ssh_port }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Display module information
      ansible.builtin.debug:
        msg: "Solving Module 02: RHTAS Installation and Image Signing"

    - name: Login to OpenShift cluster
      ansible.builtin.shell: |
        oc login {{ openshift_api_server_url }} --token={{ (lookup('file', k8s_kubeconfig) | from_yaml).users[0].user.token }} --insecure-skip-tls-verify=true
      changed_when: false

    ###########################################
    # STEP 1: Reset Module 2
    ###########################################
    - name: "STEP 1: Reset Module 2"
      block:
        - name: Reset Tekton Chains configuration
          include_tasks: tasks/step-1-reset-chains.yml

        - name: Delete OIDC refresher app
          include_tasks: tasks/step-1-reset-oidc.yml

        - name: Delete RHTAS instance
          include_tasks: tasks/step-1-reset-rhtas.yml

        - name: Delete Keycloak clients and realm
          include_tasks: tasks/step-1-reset-keycloak.yml

        - name: Clean up TaskRuns and PipelineRuns
          include_tasks: tasks/step-1-reset-pipelines.yml

        - name: Delete Quay test repository
          include_tasks: tasks/step-1-reset-quay.yml

        - name: Reset Module 2 complete
          ansible.builtin.debug:
            msg:
              - "========================================="
              - "Module 2 Reset Complete!"
              - "========================================="
              - ""
              - "Cleaned up:"
              - "  ✓ Tekton Chains configuration reverted"
              - "  ✓ OIDC refresher app removed"
              - "  ✓ OIDC info and token secrets removed"
              - "  ✓ RHTAS instance removed (Fulcio, Rekor, TUF)"
              - "  ✓ tas-chains realm deleted from Keycloak"
              - "  ✓ trusted-artifact-signer client removed from sso realm"
              - "  ✓ Test TaskRuns cleaned up"
              - "  ✓ Quay test repository removed (tssc/tekton-chains-test)"

    ###########################################
    # STEP 2: Install RHTAS
    ###########################################
    - name: "STEP 2: Install RHTAS"
      block:
        - include_tasks: tasks/step-2-solve-install-rhtas.yml

    ###########################################
    # STEP 2: Test Image Signing
    ###########################################
    - name: "STEP 2: Test Image Signing"
      block:
        - include_tasks: tasks/step-2-solve-test-image-signing.yml

    ###########################################
    # Module Summary
    ###########################################
    - name: Module 2 completion summary
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "Module 2 Complete!"
          - "========================================="
          - "Summary:"
          - "  ✓ RHTAS installed and configured"
          - "  ✓ Machine identity configured (Tekton Chains)"
          - "  ✓ Developer identity configured"
          - "  ✓ RHTAS instance deployed (Fulcio, Rekor, TUF)"
          - "  ✓ OIDC token refresher running"
          - "  ✓ Tekton Chains configured for keyless signing"
          - "  ✓ Image signing tested successfully"
