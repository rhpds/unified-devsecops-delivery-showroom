---
# Module 2 — run existing solve-module-2.sh on bastion
- name: Build SSH inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - ansible.builtin.add_host:
        name: bastion
        ansible_host: "{{ bastion_host }}"
        ansible_port: "{{ bastion_port | default(22) }}"
        ansible_user: "{{ bastion_user | default('lab-user') }}"
        ansible_password: "{{ bastion_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

- name: Module 2 Solve — run solve-module-2.sh on bastion
  hosts: bastion
  gather_facts: false
  tasks:
    - name: Run solve-module-2.sh
      ansible.builtin.shell: |
        bash $HOME/lab-assets/solve-module-2.sh
      register: r_solve

    - name: Show output
      ansible.builtin.debug:
        msg: "{{ r_solve.stdout }}"
