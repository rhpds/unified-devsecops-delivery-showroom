---
- name: Validate Module 04 - Policy Enforcement
  hosts: localhost
  gather_facts: false
  vars:
    # Environment variables matching shell script
    cluster_domain: "{{ openshift_cluster_ingress_domain }}"
    k8s_kubeconfig: "{{ lookup('env', 'K8S_AUTH_KUBECONFIG') | default('~/.kube/config', true) }}"
    acs_namespace: "stackrox"
    app_ci_namespace: "tssc-app-ci"
    # Hard-coded integration name matching script line 18
    acs_integration_name: "acs_quay"

  tasks:
  - name: Add bastion host to inventory
    ansible.builtin.add_host:
      name: "bastion"
      ansible_host: "{{ bastion_public_hostname }}"
      ansible_user: "{{ bastion_ssh_user_name }}"
      ansible_ssh_pass: "{{ bastion_ssh_password }}"
      ansible_port: "{{ bastion_ssh_port }}"
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

  - name: Initialize validation tracking
    ansible.builtin.set_fact:
      validation_failed: 0

  - name: Display validation header
    ansible.builtin.debug:
      msg:
        - "========================================="
        - "Validating Module 4: Policy Enforcement"
        - "========================================="
        - ""

  - name: Login to OpenShift cluster
    ansible.builtin.shell:
      cmd: oc login --token={{ (lookup('file', k8s_kubeconfig) | from_yaml).users[0].user.token }} --server={{ openshift_api_server_url }} --insecure-skip-tls-verify=true
    changed_when: false

  #######################################
  # Check 1: maven-image-build PipelineRun Completion
  #######################################
  - name: "Check 1: maven-image-build PipelineRun Completion"
    block:
    - name: Display check header
      ansible.builtin.debug:
        msg:
          - "Check 1: maven-image-build PipelineRun Completion"
          - "--------------------------------------------------"

    - name: Check for PipelineRun with label pipelinesascode.tekton.dev/original-prname=maven-image-build
      ansible.builtin.shell: |
        oc get pipelinerun -n {{ app_ci_namespace }} \
          -l pipelinesascode.tekton.dev/original-prname=maven-image-build \
          --sort-by=.metadata.creationTimestamp \
          -o jsonpath='{.items[-1:].metadata.name}' 2>/dev/null || echo ""
      register: pipeline_run_name
      changed_when: false
      failed_when: false

    - name: Get PipelineRun status
      ansible.builtin.shell: |
        oc get pipelinerun {{ pipeline_run_name.stdout }} -n {{ app_ci_namespace }} \
          -o jsonpath='{.status.conditions[?(@.type=="Succeeded")].status}' 2>/dev/null || echo ""
      register: pipeline_run_status
      changed_when: false
      failed_when: false
      when: pipeline_run_name.stdout != ""

    - name: Validate PipelineRun completion
      ansible.builtin.set_fact:
        validation_failed: "{{ validation_failed | int + 1 }}"
      when: >
        pipeline_run_name.stdout == "" or
        pipeline_run_status.stdout != "True"

    - name: Display PipelineRun completion result
      ansible.builtin.debug:
        msg: >-
          {% if pipeline_run_name.stdout != "" and pipeline_run_status.stdout == "True" %}
          ✓ PASS: PipelineRun '{{ pipeline_run_name.stdout }}' completed successfully
          {% elif pipeline_run_name.stdout != "" and pipeline_run_status.stdout != "" %}
          ✗ FAIL: PipelineRun '{{ pipeline_run_name.stdout }}' failed or still running (status: {{ pipeline_run_status.stdout }})
          {% elif pipeline_run_name.stdout != "" %}
          ✗ FAIL: PipelineRun '{{ pipeline_run_name.stdout }}' status unknown
          {% else %}
          ✗ FAIL: No PipelineRun found with label pipelinesascode.tekton.dev/original-prname=maven-image-build in {{ app_ci_namespace }}
          {% endif %}

    - name: Display blank line
      ansible.builtin.debug:
        msg: ""

  #######################################
  # Check 2: promote-to-stage PipelineRun Completion
  #######################################
  - name: "Check 2: promote-to-stage PipelineRun Completion"
    block:
    - name: Display check header
      ansible.builtin.debug:
        msg:
          - "Check 2: promote-to-stage PipelineRun Completion"
          - "-------------------------------------------------"

    - name: Check for PipelineRun with label pipelinesascode.tekton.dev/original-prname=promote-to-stage
      ansible.builtin.shell: |
        oc get pipelinerun -n {{ app_ci_namespace }} \
          -l pipelinesascode.tekton.dev/original-prname=promote-to-stage \
          --sort-by=.metadata.creationTimestamp \
          -o jsonpath='{.items[-1:].metadata.name}' 2>/dev/null || echo ""
      register: promote_pipeline_run_name
      changed_when: false
      failed_when: false

    - name: Get promote-to-stage PipelineRun status
      ansible.builtin.shell: |
        oc get pipelinerun {{ promote_pipeline_run_name.stdout }} -n {{ app_ci_namespace }} \
          -o jsonpath='{.status.conditions[?(@.type=="Succeeded")].status}' 2>/dev/null || echo ""
      register: promote_pipeline_run_status
      changed_when: false
      failed_when: false
      when: promote_pipeline_run_name.stdout != ""

    - name: Validate promote-to-stage PipelineRun completion
      ansible.builtin.set_fact:
        validation_failed: "{{ validation_failed | int + 1 }}"
      when: >
        promote_pipeline_run_name.stdout == "" or
        promote_pipeline_run_status.stdout != "True"

    - name: Display promote-to-stage PipelineRun completion result
      ansible.builtin.debug:
        msg: >-
          {% if promote_pipeline_run_name.stdout != "" and promote_pipeline_run_status.stdout == "True" %}
          ✓ PASS: PipelineRun '{{ promote_pipeline_run_name.stdout }}' completed successfully
          {% elif promote_pipeline_run_name.stdout != "" and promote_pipeline_run_status.stdout != "" %}
          ✗ FAIL: PipelineRun '{{ promote_pipeline_run_name.stdout }}' failed or still running (status: {{ promote_pipeline_run_status.stdout }})
          {% elif promote_pipeline_run_name.stdout != "" %}
          ✗ FAIL: PipelineRun '{{ promote_pipeline_run_name.stdout }}' status unknown
          {% else %}
          ✗ FAIL: No PipelineRun found with label pipelinesascode.tekton.dev/original-prname=promote-to-stage in {{ app_ci_namespace }}
          {% endif %}

    - name: Display blank line
      ansible.builtin.debug:
        msg: ""

  #######################################
  # Summary
  #######################################
  - name: Display validation summary
    block:
    - name: Display summary header
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "Validation Summary"
          - "========================================="
          - ""

    - name: Display successful validation summary
      ansible.builtin.debug:
        msg:
          - "✓ ALL CHECKS PASSED"
          - ""
          - "Module 4 is complete:"
          - "  ✓ maven-image-build PipelineRun completed successfully"
          - "  ✓ promote-to-stage PipelineRun completed successfully"
          - ""
      when: validation_failed | int == 0

    - name: Display failed validation summary
      ansible.builtin.debug:
        msg:
          - "✗ VALIDATION FAILED"
          - ""
          - "Some checks did not pass. Please review the output above."
          - "Run Solve Module 04 to complete missing steps."
          - ""
      when: validation_failed | int > 0

    - name: Report validation result to runner
      validation_check:
        check: "{{ validation_failed | int == 0 }}"
        pass_msg: "✓ Module validation passed"
        error_msg: "✗ Module validation FAILED with {{ validation_failed }} error(s). Review the output above."
