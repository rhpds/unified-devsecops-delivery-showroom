---
# STEP 1: Configure ACS-Quay Integration
- name: Get ACS API token from rox-api-token secret
  ansible.builtin.shell:
    cmd: oc get secret rox-api-token -n {{ app_ci_namespace }} -o jsonpath='{.data.rox-api-token}' | base64 -d
  register: acs_token
  changed_when: false
  failed_when: acs_token.stdout == ""

- name: Display service URLs
  ansible.builtin.debug:
    msg:
      - "ACS Central URL: {{ acs_route }}"
      - "Quay URL: https://{{ quay_host }}"

- name: Check for existing integration
  ansible.builtin.uri:
    url: "{{ acs_route }}/v1/imageintegrations"
    method: GET
    headers:
      Authorization: "Bearer {{ acs_token.stdout }}"
    validate_certs: false
    status_code: [200]
    return_content: true
  register: existing_integrations_response
  changed_when: false

- name: Set existing integration ID
  ansible.builtin.set_fact:
    existing_integration_id: "{{ (existing_integrations_response.json.integrations | selectattr('name', 'equalto', acs_integration_name) | list | first).id if (existing_integrations_response.json.integrations | selectattr('name', 'equalto', acs_integration_name) | list | length > 0) else '' }}"

- name: Delete existing integration if found
  when: existing_integration_id != ""
  ansible.builtin.uri:
    url: "{{ acs_route }}/v1/imageintegrations/{{ existing_integration_id }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ acs_token.stdout }}"
    validate_certs: false
    status_code: [200, 204]
  changed_when: true

- name: Create ACS-Quay integration
  ansible.builtin.uri:
    url: "{{ acs_route }}/v1/imageintegrations"
    method: POST
    headers:
      Authorization: "Bearer {{ acs_token.stdout }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ acs_integration_name }}"
      type: "quay"
      categories:
        - "REGISTRY"
        - "SCANNER"
      quay:
        endpoint: "https://{{ quay_host }}"
        oauthToken: "{{ quay_admin_token }}"
        insecure: true
      skipTestIntegration: true
    validate_certs: false
    status_code: [200, 201]
    return_content: true
  register: integration_create_response
  changed_when: true

- name: Set integration ID
  ansible.builtin.set_fact:
    integration_id: "{{ integration_create_response.json.id }}"

- name: Verify integration created
  ansible.builtin.fail:
    msg: "Failed to create integration"
  when: integration_id is not defined or integration_id == "" or integration_id is none

- name: ACS configuration complete
  ansible.builtin.debug:
    msg:
      - "✓ ACS-Quay integration configured"
      - "Integration name: {{ acs_integration_name }}"
      - "Integration ID: {{ integration_id }}"
      - "Endpoint: https://{{ quay_host }}"
      - "Type: Registry + Scanner"
