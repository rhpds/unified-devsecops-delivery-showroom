---
# STEP 1: Reset - Clean up GitLab Repositories
- name: Debug GitLab token status
  ansible.builtin.debug:
    msg: "GitLab token available: {{ gitlab_token is defined and gitlab_token.stdout is defined and gitlab_token.stdout != '' }}"

- name: Get GitLab group ID for development group
  ansible.builtin.uri:
    url: "{{ gitlab_url }}/api/v4/groups/{{ gitlab_group }}"
    method: GET
    validate_certs: false
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token.stdout }}"
    status_code: [200, 404]
  register: gitlab_group_info
  changed_when: false
  failed_when: false
  when: >
    gitlab_url is defined and
    gitlab_token.stdout is defined and
    gitlab_token.stdout != ""

- name: Get all projects in development group
  ansible.builtin.uri:
    url: "{{ gitlab_url }}/api/v4/groups/{{ gitlab_group_info.json.id }}/projects"
    method: GET
    validate_certs: false
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token.stdout }}"
    status_code: [200]
  register: gitlab_projects
  changed_when: false
  failed_when: false
  when: >
    gitlab_url is defined and
    gitlab_token.stdout is defined and
    gitlab_token.stdout != "" and
    gitlab_group_info.status is defined and
    gitlab_group_info.status == 200

- name: Debug projects found
  ansible.builtin.debug:
    msg: "Found {{ gitlab_projects.json | default([]) | length }} project(s) in development group"
  when: gitlab_projects.json is defined

- name: Mark all projects for deletion (step 1 of 2)
  ansible.builtin.uri:
    url: "{{ gitlab_url }}/api/v4/projects/{{ item.id }}"
    method: DELETE
    validate_certs: false
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token.stdout }}"
    status_code: [202, 204]
  loop: "{{ gitlab_projects.json | default([]) }}"
  when: >
    gitlab_projects.json is defined and
    gitlab_projects.json | length > 0
  register: gitlab_mark_results
  changed_when: true

- name: Wait for projects to be marked for deletion
  ansible.builtin.pause:
    seconds: 2
  when: >
    gitlab_projects.json is defined and
    gitlab_projects.json | length > 0

- name: Get updated project list with deletion_scheduled paths
  ansible.builtin.uri:
    url: "{{ gitlab_url }}/api/v4/groups/{{ gitlab_group_info.json.id }}/projects"
    method: GET
    validate_certs: false
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token.stdout }}"
    status_code: [200, 404]
  register: gitlab_projects_scheduled
  changed_when: false
  failed_when: false
  when: >
    gitlab_mark_results is defined and
    gitlab_mark_results.changed

- name: Permanently delete all marked projects (step 2 of 2)
  ansible.builtin.uri:
    url: "{{ gitlab_url }}/api/v4/projects/{{ item.id }}?permanently_remove=true&full_path={{ item.path_with_namespace | urlencode }}"
    method: DELETE
    validate_certs: false
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token.stdout }}"
    status_code: [202, 204]
  loop: "{{ gitlab_projects_scheduled.json | default([]) }}"
  when: >
    gitlab_projects_scheduled.json is defined and
    gitlab_projects_scheduled.json | length > 0
  register: gitlab_delete_results
  changed_when: true

- name: Display GitLab cleanup results
  ansible.builtin.debug:
    msg: "{{ '✓ Deleted ' + (gitlab_projects.json | default([]) | length | string) + ' project(s) from development group (marked and permanently removed)' if gitlab_projects.json is defined and gitlab_projects.json | length > 0 else '✓ No projects found in development group' }}"
  when: >
    gitlab_url is defined and
    gitlab_group_info.status is defined and
    gitlab_group_info.status == 200

- name: Display GitLab group not found warning
  ansible.builtin.debug:
    msg: "⚠ WARNING: GitLab group 'development' not found"
  when: >
    gitlab_url is defined and
    gitlab_group_info.status is defined and
    gitlab_group_info.status == 404

# Reset RHDH template to clean commit
- name: Set GitLab template repo details
  ansible.builtin.set_fact:
    template_repo_url: "{{ gitlab_url }}/rhdh/build-secured-dev-workflows-idp-configuration.git"
    template_repo_dir: "/tmp/reset-template-repo"
    commit_reset_file: "/tmp/module-4-commit-reset"
  when: gitlab_url is defined

- name: Check if commit reset file exists
  ansible.builtin.stat:
    path: "{{ commit_reset_file }}"
  register: commit_file_stat
  when: gitlab_url is defined

- name: Read existing commit ID from file
  ansible.builtin.slurp:
    src: "{{ commit_reset_file }}"
  register: existing_commit_id
  when: >
    gitlab_url is defined and
    commit_file_stat.stat.exists
  failed_when: false

- name: Set commit ID from file
  ansible.builtin.set_fact:
    reset_commit_id: "{{ existing_commit_id.content | b64decode | trim }}"
  when: >
    gitlab_url is defined and
    commit_file_stat.stat.exists and
    existing_commit_id.content is defined

- name: Display using existing commit ID
  ansible.builtin.debug:
    msg: "Using existing commit ID from file: {{ reset_commit_id }}"
  when: >
    gitlab_url is defined and
    commit_file_stat.stat.exists and
    reset_commit_id is defined

- name: Remove existing template repo directory
  ansible.builtin.file:
    path: "{{ template_repo_dir }}"
    state: absent
  when: gitlab_url is defined

- name: Clone template repository
  ansible.builtin.shell:
    cmd: |
      git clone https://root:{{ gitlab_token.stdout }}@{{ gitlab_url.split('//')[1] }}/rhdh/build-secured-dev-workflows-idp-configuration.git {{ template_repo_dir }}
  environment:
    GIT_SSL_NO_VERIFY: "true"
  changed_when: false
  when: gitlab_url is defined

- name: Get latest commit ID and save to file (first time only)
  ansible.builtin.shell:
    cmd: |
      cd {{ template_repo_dir }}
      COMMIT_ID=$(git rev-parse HEAD)
      echo "$COMMIT_ID" > {{ commit_reset_file }}
      echo "$COMMIT_ID"
  register: new_commit_id
  changed_when: true
  when: >
    gitlab_url is defined and
    not commit_file_stat.stat.exists

- name: Set commit ID from repository (first time)
  ansible.builtin.set_fact:
    reset_commit_id: "{{ new_commit_id.stdout | trim }}"
  when: >
    gitlab_url is defined and
    not commit_file_stat.stat.exists

- name: Display saved new commit ID
  ansible.builtin.debug:
    msg: "Saved new commit ID to file: {{ reset_commit_id }}"
  when: >
    gitlab_url is defined and
    not commit_file_stat.stat.exists

- name: Reset template to clean commit
  ansible.builtin.shell:
    cmd: |
      cd {{ template_repo_dir }}
      git reset --hard {{ reset_commit_id }}
  changed_when: true
  when: gitlab_url is defined

- name: Force push clean template to GitLab
  ansible.builtin.shell:
    cmd: |
      cd {{ template_repo_dir }}
      git push --force origin main
  environment:
    GIT_SSL_NO_VERIFY: "true"
  changed_when: true
  when: gitlab_url is defined

- name: Display template reset result
  ansible.builtin.debug:
    msg: "✓ RHDH template reset to commit {{ reset_commit_id }}"
  when: gitlab_url is defined
