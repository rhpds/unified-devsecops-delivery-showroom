---
# Module 4: Configure ACS and Test Image Scanning
# Translates: solve-module-4.sh (exact implementation from scripts)
- name: Solve Module 04 - Policy Enforcement and Image Scanning
  hosts: localhost
  gather_facts: false

  vars:
    # Variables from user_data.yml (injected via -e @/user_data/user_data.yml)
    # Available: acs_route, quay_host, quay_admin_token, bastion_*, openshift_*
    # gitlab_url, gitlab_root_user, gitlab_root_password
    # developer_hub_url

    # Static variables
    acs_namespace: "stackrox"
    app_ci_namespace: "tssc-app-ci"
    acs_integration_name: "acs_quay"
    quay_org: "tssc"
    quay_repo: "tekton-chains-test"
    image_tag: "latest"
    backstage_namespace: "backstage"
    gitlab_namespace: "gitlab"
    gitlab_group: "development"
    rhdh_template_clean_commit: "9468649cc2fad7f950b20461bf4afdbeaa6bf9b7"

  module_defaults:
    group/kubernetes.core.k8s:
      host: "{{ openshift_api_server_url }}"
      api_key: "{{ (lookup('file', k8s_kubeconfig) | from_yaml).users[0].user.token }}"
      validate_certs: false

  tasks:
    - name: Add bastion host to inventory
      ansible.builtin.add_host:
        name: "bastion"
        ansible_host: "{{ bastion_public_hostname }}"
        ansible_user: "{{ bastion_ssh_user_name }}"
        ansible_ssh_pass: "{{ bastion_ssh_password }}"
        ansible_port: "{{ bastion_ssh_port }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Display module information
      ansible.builtin.debug:
        msg: "Solving Module 04: ACS Configuration and Image Scanning"

    ###########################################
    # STEP 0: Gather Prerequisites
    ###########################################
    - name: "STEP 0: Gather Prerequisites"
      block:
        - include_tasks: steps/step-0-gather-prerequisites.yml

    ###########################################
    # STEP 1: Reset Module 4
    ###########################################
    - name: "STEP 1: Reset Module 4"
      block:
        - name: Clean up ArgoCD Applications
          include_tasks: steps/step-1-reset-argocd.yml

        - name: Clean up GitLab Repositories
          include_tasks: steps/step-1-reset-gitlab.yml

        - name: Clean up Developer Hub Components
          include_tasks: steps/step-1-reset-devhub.yml

        - name: Reset ACS Integration
          include_tasks: steps/step-1-reset-acs.yml

        - name: Reset complete
          ansible.builtin.debug:
            msg:
              - "========================================="
              - "Module 4 Reset Complete"
              - "========================================="
              - "  ✓ ArgoCD applications deleted"
              - "  ✓ GitLab development group repositories cleaned"
              - "  ✓ Developer Hub components deleted"
              - "  ✓ ACS integration reset"
              - ""

    ###########################################
    # STEP 2: Solve Module 4
    ###########################################
    - name: "STEP 2: Solve Module 4"
      block:
        - name: "STEP 2.1: Configure ACS-Quay Integration"
          delegate_to: bastion
          block:
            - include_tasks: steps/step-2-solve-acs.yml

        - name: "STEP 2.2: Test Image Scanning"
          delegate_to: bastion
          block:
            - include_tasks: steps/step-2-solve-image-scanning.yml

        - name: "STEP 2.3: Update and Run RHDH Template"
          delegate_to: bastion
          when: gitlab_url is defined
          block:
            - include_tasks: steps/step-2-solve-run-template.yml

        - name: Module 4 completion summary
          ansible.builtin.debug:
            msg:
              - "========================================="
              - "Module 4 Complete!"
              - "========================================="
              - "Summary:"
              - "  ✓ ACS-Quay integration configured"
              - "  ✓ Image scanning tested with roxctl"
              - "  ✓ Policy checks verified"
              - "  ✓ RHDH template updated and executed"
              - "  ✓ Template executed with verify commits enabled"
              - "  ✓ Ready for supply chain policy enforcement"

