---
# Module 4: Configure ACS and Test Image Scanning
# Translates: solve-module-4.sh (exact implementation from scripts)
- name: Solve Module 04 - Policy Enforcement and Image Scanning
  hosts: localhost
  gather_facts: false

  vars:
    # Variables from user_data.yml (injected via -e @/user_data/user_data.yml)
    # Available: acs_route, quay_host, quay_admin_token, bastion_*, openshift_*
    # gitlab_url, gitlab_root_user, gitlab_root_password
    # developer_hub_url

    # Static variables
    acs_namespace: "stackrox"
    app_ci_namespace: "tssc-app-ci"
    acs_integration_name: "acs_quay"
    quay_org: "tssc"
    quay_repo: "tekton-chains-test"
    image_tag: "latest"
    backstage_namespace: "backstage"
    gitlab_namespace: "gitlab"
    gitlab_group: "development"

  module_defaults:
    group/kubernetes.core.k8s:
      host: "{{ openshift_api_server_url }}"
      api_key: "{{ (lookup('file', k8s_kubeconfig) | from_yaml).users[0].user.token }}"
      validate_certs: false

  tasks:
    - name: Add bastion host to inventory
      ansible.builtin.add_host:
        name: "bastion"
        ansible_host: "{{ bastion_public_hostname }}"
        ansible_user: "{{ bastion_ssh_user_name }}"
        ansible_ssh_pass: "{{ bastion_ssh_password }}"
        ansible_port: "{{ bastion_ssh_port }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Display module information
      ansible.builtin.debug:
        msg: "Solving Module 04: ACS Configuration and Image Scanning"

    ###########################################
    # STEP 0: Reset Module 4 (reset-module-4.sh)
    ###########################################
    - name: "STEP 0: Reset Module 4"
      block:
        # Get RHDH API Token
        - name: Get RHDH API token from backstage secret
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Secret
            name: backstage-env-secret
            namespace: "{{ backstage_namespace }}"
          register: backstage_secret
          failed_when: false

        - name: Set RHDH API token fact
          ansible.builtin.set_fact:
            rhdh_api_token: "{{ backstage_secret.resources[0].data.AUTOMATION_SECRET | b64decode }}"
          when: >
            backstage_secret.resources is defined and
            backstage_secret.resources | length > 0

        - name: Display token retrieval status
          ansible.builtin.debug:
            msg: "{{ '✓ RHDH API token retrieved' if rhdh_api_token is defined else '⚠ WARNING: Could not retrieve RHDH API token' }}"

        # Clean up GitLab Repositories
        - name: Get GitLab personal access token
          ansible.builtin.shell:
            cmd: |
              oc get secret root-user-personal-token -n {{ gitlab_namespace }} -o jsonpath='{.data.token}' | base64 -d
          changed_when: false
          register: gitlab_token
          failed_when: false
          delegate_to: bastion
          when: gitlab_url is defined

        - name: Display GitLab token retrieval status
          ansible.builtin.debug:
            msg: "{{ '✓ GitLab token retrieved' if gitlab_token.stdout is defined and gitlab_token.stdout != '' else '⚠ WARNING: Could not retrieve GitLab token' }}"
          when: gitlab_url is defined

        - name: Get GitLab group ID for development group
          ansible.builtin.uri:
            url: "{{ gitlab_url }}/api/v4/groups/{{ gitlab_group }}"
            method: GET
            validate_certs: false
            headers:
              PRIVATE-TOKEN: "{{ gitlab_token.stdout }}"
            status_code: [200, 404]
          register: gitlab_group_info
          changed_when: false
          failed_when: false
          delegate_to: bastion
          when: >
            gitlab_url is defined and
            gitlab_token.stdout is defined and
            gitlab_token.stdout != ""

        - name: Get all projects in development group
          ansible.builtin.uri:
            url: "{{ gitlab_url }}/api/v4/groups/{{ gitlab_group_info.json.id }}/projects"
            method: GET
            validate_certs: false
            headers:
              PRIVATE-TOKEN: "{{ gitlab_token.stdout }}"
            status_code: [200]
          register: gitlab_projects
          changed_when: false
          failed_when: false
          delegate_to: bastion
          when: >
            gitlab_url is defined and
            gitlab_token.stdout is defined and
            gitlab_token.stdout != "" and
            gitlab_group_info.status is defined and
            gitlab_group_info.status == 200

        - name: Delete all projects in development group
          ansible.builtin.uri:
            url: "{{ gitlab_url }}/api/v4/projects/{{ item.id }}"
            method: DELETE
            validate_certs: false
            headers:
              PRIVATE-TOKEN: "{{ gitlab_token.stdout }}"
            status_code: [202, 204]
          loop: "{{ gitlab_projects.json | default([]) }}"
          when: >
            gitlab_projects.json is defined and
            gitlab_projects.json | length > 0
          register: gitlab_delete_results
          changed_when: true
          delegate_to: bastion

        - name: Display GitLab cleanup results
          ansible.builtin.debug:
            msg: "{{ '✓ Deleted ' + (gitlab_projects.json | default([]) | length | string) + ' project(s) from development group' if gitlab_projects.json is defined and gitlab_projects.json | length > 0 else '✓ No projects found in development group' }}"
          when: >
            gitlab_url is defined and
            gitlab_group_info.status is defined and
            gitlab_group_info.status == 200

        - name: Display GitLab group not found warning
          ansible.builtin.debug:
            msg: "⚠ WARNING: GitLab group 'development' not found"
          when: >
            gitlab_url is defined and
            gitlab_group_info.status is defined and
            gitlab_group_info.status == 404

        # Clean up Developer Hub Components
        - name: Get component entities from Developer Hub
          ansible.builtin.uri:
            url: "{{ developer_hub_url }}/api/catalog/entities?filter=kind=component"
            method: GET
            validate_certs: false
            headers:
              Authorization: "Bearer {{ rhdh_api_token }}"
            status_code: [200]
          register: rhdh_entities
          changed_when: false
          failed_when: false
          delegate_to: localhost
          when: >
            developer_hub_url is defined and
            rhdh_api_token is defined

        - name: Filter components to delete (my-quarkus-tkn*)
          ansible.builtin.set_fact:
            components_to_delete: "{{ rhdh_entities.json | default([]) | selectattr('metadata.name', 'match', '^my-quarkus-tkn.*$') | list }}"
          when: >
            rhdh_entities.json is defined

        - name: Display components found
          ansible.builtin.debug:
            msg: "Found {{ components_to_delete | default([]) | length }} component(s) to delete: {{ components_to_delete | default([]) | map(attribute='metadata.name') | list }}"
          when: components_to_delete is defined

        - name: Delete my-quarkus-tkn components from Developer Hub
          ansible.builtin.uri:
            url: "{{ developer_hub_url }}/api/catalog/entities/by-name/{{ item.kind | lower }}/{{ item.metadata.namespace | default('default') }}/{{ item.metadata.name }}"
            method: DELETE
            validate_certs: false
            headers:
              Authorization: "Bearer {{ rhdh_api_token }}"
            status_code: [204, 404]
          loop: "{{ components_to_delete | default([]) }}"
          when: >
            components_to_delete is defined and
            components_to_delete | length > 0
          register: rhdh_delete_results
          changed_when: true
          delegate_to: localhost

        - name: Display RHDH cleanup results
          ansible.builtin.debug:
            msg: "{{ '✓ Deleted ' + (components_to_delete | default([]) | length | string) + ' component(s) from Developer Hub' if components_to_delete is defined and components_to_delete | length > 0 else '✓ No matching components found in Developer Hub' }}"
          when: developer_hub_url is defined

        # Reset ACS Integration
        - name: Check if rox-api-token secret exists
          ansible.builtin.command:
            cmd: oc get secret rox-api-token -n {{ app_ci_namespace }}
          register: rox_secret_check
          changed_when: false
          failed_when: false
          delegate_to: bastion

        - name: Get ACS API token from rox-api-token secret
          ansible.builtin.shell:
            cmd: oc get secret rox-api-token -n {{ app_ci_namespace }} -o jsonpath='{.data.rox-api-token}' | base64 -d
          register: acs_api_token
          changed_when: false
          failed_when: false
          delegate_to: bastion
          when: rox_secret_check.rc == 0

        - name: Check for existing ACS integration
          ansible.builtin.shell:
            cmd: |
              curl -k -s -X GET "{{ acs_route }}/v1/imageintegrations" \
                -H "Authorization: Bearer {{ acs_api_token.stdout }}" 2>/dev/null | \
                jq -r '.integrations[] | select(.name=="{{ acs_integration_name }}") | .id' 2>/dev/null || echo ""
          register: integration_id
          changed_when: false
          failed_when: false
          delegate_to: bastion
          when: >
            rox_secret_check.rc == 0 and
            acs_api_token.stdout is defined and
            acs_api_token.stdout != ""

        - name: Delete ACS integration via API
          ansible.builtin.shell:
            cmd: |
              curl -k -s -o /dev/null -w "%{http_code}" -X DELETE \
                "{{ acs_route }}/v1/imageintegrations/{{ integration_id.stdout }}" \
                -H "Authorization: Bearer {{ acs_api_token.stdout }}" 2>/dev/null || echo "000"
          register: delete_response
          changed_when: delete_response.stdout in ["200", "204"]
          failed_when: false
          delegate_to: bastion
          when: >
            integration_id.stdout is defined and
            integration_id.stdout != ""

        - name: Verify ACS integration deletion
          ansible.builtin.shell:
            cmd: |
              curl -k -s -X GET "{{ acs_route }}/v1/imageintegrations" \
                -H "Authorization: Bearer {{ acs_api_token.stdout }}" 2>/dev/null | \
                jq -r '.integrations[] | select(.name=="{{ acs_integration_name }}") | .id' 2>/dev/null || echo ""
          register: verify_integration
          changed_when: false
          failed_when: false
          delegate_to: bastion
          when: >
            integration_id.stdout is defined and
            integration_id.stdout != ""

        - name: Display ACS integration deletion result
          ansible.builtin.debug:
            msg: "{{ '✓ ACS-Quay integration deleted' if verify_integration.stdout is defined and verify_integration.stdout == '' else '✓ No ACS integration found' }}"
          when: rox_secret_check.rc == 0

        - name: Reset complete
          ansible.builtin.debug:
            msg:
              - "========================================="
              - "Module 4 Reset Complete"
              - "========================================="
              - "  ✓ RHDH API token retrieved"
              - "  ✓ GitLab development group repositories cleaned"
              - "  ✓ Developer Hub components deleted"
              - "  ✓ ACS integration reset"
              - ""

    ###########################################
    # STEP 1: Fix RHDH Template User Reference
    ###########################################
    - name: "STEP 1: Fix RHDH Template User Reference"
      delegate_to: bastion
      when: gitlab_url is defined
      block:
        - name: Set GitLab repo details
          ansible.builtin.set_fact:
            gitlab_repo_url: "{{ gitlab_url }}/rhdh/build-secured-dev-workflows-idp-configuration.git"
            gitlab_repo_dir: "/tmp/build-secured-dev-workflows-idp-configuration"
            template_file: "/tmp/build-secured-dev-workflows-idp-configuration/scaffolder-templates/quarkus-stssc-template/template.yaml"

        - name: Remove existing repo directory
          ansible.builtin.file:
            path: "{{ gitlab_repo_dir }}"
            state: absent

        - name: Clone GitLab repository
          ansible.builtin.shell:
            cmd: |
              git clone {{ gitlab_repo_url }} {{ gitlab_repo_dir }}
          environment:
            GIT_SSL_NO_VERIFY: "true"
          changed_when: true

        - name: Create backup of template file
          ansible.builtin.copy:
            src: "{{ template_file }}"
            dest: "{{ template_file }}.backup"
            remote_src: true
            force: true

        - name: Display backup created
          ansible.builtin.debug:
            msg: "✓ Backup created: {{ template_file }}.backup"

        - name: Fix lines 110 and 144 - Add fallback for user.entity.metadata.name
          ansible.builtin.shell:
            cmd: |
              python3 << 'EOF'
              with open('{{ template_file }}', 'r') as f:
                  content = f.read()

              old_text = "owner: user:default/${{ user.entity.metadata.name }}"
              new_text = "owner: user:default/${{ user.entity.metadata.name || 'user1' }}"
              content = content.replace(old_text, new_text)

              with open('{{ template_file }}', 'w') as f:
                  f.write(content)
              EOF
          changed_when: true
          delegate_to: bastion

        - name: Verify template file changes
          ansible.builtin.shell:
            cmd: |
              grep -n "owner: user:default" {{ template_file }}
          register: template_changes
          changed_when: false

        - name: Display template changes
          ansible.builtin.debug:
            msg: "{{ template_changes.stdout_lines }}"

        - name: Configure git user for commit
          ansible.builtin.shell:
            cmd: |
              cd {{ gitlab_repo_dir }}
              git config user.email "automation@redhat.com"
              git config user.name "Automation"
          changed_when: false

        - name: Commit template changes
          ansible.builtin.shell:
            cmd: |
              cd {{ gitlab_repo_dir }}
              git add scaffolder-templates/quarkus-stssc-template/template.yaml
              git commit -m "Fix template user reference fallback"
          changed_when: true
          register: git_commit
          failed_when: git_commit.rc != 0 and 'nothing to commit' not in git_commit.stdout

        - name: Push changes to GitLab
          ansible.builtin.shell:
            cmd: |
              cd {{ gitlab_repo_dir }}
              git push https://root:{{ gitlab_token.stdout }}@{{ gitlab_url.split('//')[1] }}/rhdh/build-secured-dev-workflows-idp-configuration.git
          environment:
            GIT_SSL_NO_VERIFY: "true"
          changed_when: true
          when: git_commit.rc == 0

        - name: Display git push result
          ansible.builtin.debug:
            msg: "✓ Template changes pushed to GitLab"
          when: git_commit.rc == 0

        - name: Refresh template in Developer Hub
          ansible.builtin.uri:
            url: "{{ developer_hub_url }}/api/catalog/refresh"
            method: POST
            validate_certs: false
            headers:
              Authorization: "Bearer {{ rhdh_api_token }}"
              Content-Type: "application/json"
            body_format: json
            body:
              entityRef: "template:default/quarkus-stssc-template"
            status_code: [200, 202]
          register: template_refresh
          delegate_to: localhost
          when: >
            developer_hub_url is defined and
            rhdh_api_token is defined

        - name: Display template refresh result
          ansible.builtin.debug:
            msg: "✓ RHDH template refreshed"
          when: template_refresh.status is defined and template_refresh.status in [200, 202]

        - name: Run template with verify commits enabled
          ansible.builtin.uri:
            url: "{{ developer_hub_url }}/api/scaffolder/v2/tasks"
            method: POST
            validate_certs: false
            headers:
              Authorization: "Bearer {{ rhdh_api_token }}"
              Content-Type: "application/json"
            body_format: json
            body:
              templateRef: "template:default/quarkus-stssc-template"
              values:
                name: "my-quarkus-tkn"
                groupId: "redhat.rhdh"
                artifactId: "my-quarkus-tkn"
                javaPackageName: "org.redhat.rhdh"
                description: "A Quarkus application that uses Langchain and Software Supply Chain Security with Tekton CI"
                imageHost: "Quay"
                imageOrganization: "tssc"
                repoHost: "GitLab"
                repoOwner: "development"
                repoVerifyCommits: "enabled"
            status_code: [201]
          register: scaffolder_task
          delegate_to: localhost
          when: >
            developer_hub_url is defined and
            rhdh_api_token is defined

        - name: Set scaffolder task ID
          ansible.builtin.set_fact:
            task_id: "{{ scaffolder_task.json.id }}"
          when: >
            scaffolder_task.json is defined and
            scaffolder_task.json.id is defined

        - name: Display scaffolder task started
          ansible.builtin.debug:
            msg: "✓ Scaffolder task started: {{ task_id }}"
          when: task_id is defined

        - name: Wait for scaffolder task to complete
          ansible.builtin.uri:
            url: "{{ developer_hub_url }}/api/scaffolder/v2/tasks/{{ task_id }}"
            method: GET
            validate_certs: false
            headers:
              Authorization: "Bearer {{ rhdh_api_token }}"
            status_code: [200]
          register: task_status
          until: task_status.json.status in ['completed', 'failed']
          retries: 60
          delay: 10
          delegate_to: localhost
          when: task_id is defined

        - name: Display scaffolder task result
          ansible.builtin.debug:
            msg: "{{ '✓ Scaffolder task completed successfully' if task_status.json.status == 'completed' else '✗ Scaffolder task failed: ' + (task_status.json.error | default('Unknown error')) }}"
          when: task_status.json is defined

        - name: Template fix complete
          ansible.builtin.debug:
            msg:
              - "✓ Template user reference fixed"
              - "✓ Changes committed and pushed to GitLab"
              - "✓ RHDH template catalog refreshed"
              - "✓ Template executed with verify commits enabled"

    ###########################################
    # STEP 2: Configure ACS (configure-acs.sh)
    ###########################################
    - name: "STEP 2: Configure ACS-Quay Integration"
      delegate_to: bastion
      block:
        - name: Get ACS API token from rox-api-token secret
          ansible.builtin.shell:
            cmd: oc get secret rox-api-token -n {{ app_ci_namespace }} -o jsonpath='{.data.rox-api-token}' | base64 -d
          register: acs_token
          changed_when: false
          failed_when: acs_token.stdout == ""

        - name: Display service URLs
          ansible.builtin.debug:
            msg:
              - "ACS Central URL: {{ acs_route }}"
              - "Quay URL: https://{{ quay_host }}"

        - name: Check for existing integration
          ansible.builtin.shell:
            cmd: |
              curl -k -s -X GET "{{ acs_route }}/v1/imageintegrations" \
                -H "Authorization: Bearer {{ acs_token.stdout }}" 2>/dev/null | \
                jq -r '.integrations[] | select(.name=="{{ acs_integration_name }}") | .id' 2>/dev/null || echo ""
          register: existing_integration
          changed_when: false

        - name: Delete existing integration if found
          when: existing_integration.stdout != ""
          ansible.builtin.shell:
            cmd: |
              curl -k -s -X DELETE "{{ acs_route }}/v1/imageintegrations/{{ existing_integration.stdout }}" \
                -H "Authorization: Bearer {{ acs_token.stdout }}" > /dev/null 2>&1
          changed_when: true

        - name: Create ACS-Quay integration
          ansible.builtin.shell:
            cmd: |
              curl -k -s -X POST "{{ acs_route }}/v1/imageintegrations" \
                -H "Authorization: Bearer {{ acs_token.stdout }}" \
                -H "Content-Type: application/json" \
                -d '{
                  "name": "{{ acs_integration_name }}",
                  "type": "quay",
                  "categories": ["REGISTRY", "SCANNER"],
                  "quay": {
                    "endpoint": "https://{{ quay_host }}",
                    "oauthToken": "{{ quay_admin_token }}",
                    "insecure": true
                  },
                  "skipTestIntegration": true
                }' 2>/dev/null
          register: integration_create
          changed_when: true

        - name: Extract integration ID
          ansible.builtin.set_fact:
            integration_id: "{{ integration_create.stdout | from_json | json_query('id') }}"

        - name: Verify integration created
          ansible.builtin.fail:
            msg: "Failed to create integration"
          when: integration_id == "" or integration_id is none

        - name: Test ACS-Quay integration
          ansible.builtin.shell:
            cmd: |
              curl -k -s -X POST "{{ acs_route }}/v1/imageintegrations/{{ integration_id }}/test" \
                -H "Authorization: Bearer {{ acs_token.stdout }}" 2>/dev/null
          changed_when: false

        - name: ACS configuration complete
          ansible.builtin.debug:
            msg:
              - "✓ ACS-Quay integration configured"
              - "Integration name: {{ acs_integration_name }}"
              - "Integration ID: {{ integration_id }}"
              - "Endpoint: https://{{ quay_host }}"
              - "Type: Registry + Scanner"

    ###########################################
    # STEP 3: Test Image Scanning (test-image-scanning.sh)
    ###########################################
    - name: "STEP 3: Test Image Scanning"
      delegate_to: bastion
      block:
        - name: Get ROX API token from rox-api-token secret
          ansible.builtin.shell:
            cmd: oc get secret rox-api-token -n {{ app_ci_namespace }} -o jsonpath='{.data.rox-api-token}' | base64 -d
          register: rox_token
          changed_when: false
          failed_when: rox_token.stdout == ""

        - name: Set scanning variables
          ansible.builtin.set_fact:
            rox_endpoint: "{{ acs_route }}:443"
            test_image: "{{ quay_host }}/{{ quay_org }}/{{ quay_repo }}:{{ image_tag }}"

        - name: Display test configuration
          ansible.builtin.debug:
            msg:
              - "✓ roxctl configured"
              - "ACS endpoint: {{ rox_endpoint }}"
              - "Test image: {{ test_image }}"

        - name: Run roxctl image scan
          ansible.builtin.shell:
            cmd: roxctl --insecure-skip-tls-verify image scan --image="{{ test_image }}" > {{ job_info_dir | default('/tmp') }}/roxctl-scan.txt 2>&1
          environment:
            ROX_API_TOKEN: "{{ rox_token.stdout }}"
            ROX_ENDPOINT: "{{ rox_endpoint }}"
          changed_when: false
          failed_when: false  # Script uses || true
          register: scan_result

        - name: Display scan summary
          ansible.builtin.debug:
            msg: "✓ Image scan completed (output saved to {{ job_info_dir | default('/tmp') }}/roxctl-scan.txt)"

        - name: Run roxctl image check
          ansible.builtin.shell:
            cmd: roxctl --insecure-skip-tls-verify image check --image="{{ test_image }}" > {{ job_info_dir | default('/tmp') }}/roxctl-check.txt 2>&1
          environment:
            ROX_API_TOKEN: "{{ rox_token.stdout }}"
            ROX_ENDPOINT: "{{ rox_endpoint }}"
          changed_when: false
          failed_when: false  # Script uses || true
          register: check_result

        - name: Display policy check summary
          ansible.builtin.debug:
            msg: "✓ Policy check completed (output saved to {{ job_info_dir | default('/tmp') }}/roxctl-check.txt)"

        - name: Image scanning test complete
          ansible.builtin.debug:
            msg:
              - "========================================="
              - "Image Scanning Test Complete!"
              - "========================================="
              - "Test Results:"
              - "  Image: {{ test_image }}"
              - "  Scan: Completed"
              - "  Policy Check: Completed"
              - ""
              - "Key Findings:"
              - "  ✓ Container images can be scanned from the registry using ACS"
              - "  ✓ Vulnerability findings are associated with specific image digest"
              - "  ✓ Policy evaluation can be performed programmatically"

    ###########################################
    # Module Summary
    ###########################################
    - name: Module 4 completion summary
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "Module 4 Complete!"
          - "========================================="
          - "Summary:"
          - "  ✓ RHDH template user reference fixed"
          - "  ✓ Template executed with verify commits enabled"
          - "  ✓ ACS-Quay integration configured"
          - "  ✓ Image scanning tested with roxctl"
          - "  ✓ Policy checks verified"
          - "  ✓ Ready for supply chain policy enforcement"
