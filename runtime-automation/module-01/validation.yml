---
# Module 1 — run existing validate-module-1.sh on bastion
- name: Build SSH inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - ansible.builtin.add_host:
        name: bastion
        ansible_host: "{{ bastion_host }}"
        ansible_port: "{{ bastion_port | default(22) }}"
        ansible_user: "{{ bastion_user | default('lab-user') }}"
        ansible_password: "{{ bastion_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

- name: Module 1 Validation — run validate-module-1.sh on bastion
  hosts: bastion
  gather_facts: false
  tasks:
    - name: Run validate-module-1.sh
      ansible.builtin.shell: |
        bash $HOME/lab-assets/validate-module-1.sh
      register: r_validate
      ignore_errors: true

    - name: Report validation result
      validation_check:
        check: "{{ r_validate.rc == 0 }}"
        pass_msg: "{{ r_validate.stdout | trim }}"
        error_msg: "{{ r_validate.stdout | trim }}\n{{ r_validate.stderr | trim }}"
