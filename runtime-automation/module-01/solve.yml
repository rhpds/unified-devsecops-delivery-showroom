---
# Module 1: Install RHTPA and Upload SBOM
# Translates: solve-module-1.sh -> reset-module-1.sh + install-rhtpa.sh + upload-sbom.sh
- name: Solve Module 01 - RHTPA Installation
  hosts: localhost
  gather_facts: false

  vars:
    # Variables from user_data.yml (injected via -e @/user_data/user_data.yml)
    cluster_domain: "{{ openshift_cluster_ingress_domain }}"

    # Static variables (not in user_data)
    keycloak_namespace: "tssc-keycloak"
    tpa_namespace: "tssc-tpa"
    sbom_file: "/home/lab-user/lab-assets/example-sbom.json"
    sbom_id: "test-sbom"
    lab_assets_dir: "/home/lab-user/lab-assets"

  module_defaults:
    group/kubernetes.core.k8s:
      host: "{{ openshift_api_server_url }}"
      api_key: "{{ (lookup('file', k8s_kubeconfig) | from_yaml).users[0].user.token }}"
      validate_certs: false

  tasks:
    - name: Display module information
      ansible.builtin.debug:
        msg: "Solving Module 01: RHTPA Installation and SBOM Upload"

    - name: Add bastion host to inventory
      ansible.builtin.add_host:
        name: "bastion"
        ansible_host: "{{ bastion_public_hostname }}"
        ansible_user: "{{ bastion_ssh_user_name }}"
        ansible_ssh_pass: "{{ bastion_ssh_password }}"
        ansible_port: "{{ bastion_ssh_port }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Login to OpenShift cluster
      ansible.builtin.shell: |
        oc login {{ openshift_api_server_url }} --token={{ (lookup('file', k8s_kubeconfig) | from_yaml).users[0].user.token }} --insecure-skip-tls-verify=true
      changed_when: false

    ###########################################
    # STEP 1: Reset Module 1
    ###########################################
    - name: "STEP 1: Reset Module 1"
      block:
        - include_tasks: tasks/step-1-reset.yml

    ###########################################
    # STEP 2: Install RHTPA
    ###########################################
    - name: "STEP 2: Install RHTPA"
      block:
        - include_tasks: tasks/step-2-solve-install-rhtpa.yml

    ###########################################
    # STEP 2: Upload SBOM
    ###########################################
    - name: "STEP 2: Upload SBOM"
      block:
        - include_tasks: tasks/step-2-solve-upload-sbom.yml

    ###########################################
    # Module Summary
    ###########################################
    - name: Module 1 completion summary
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "Module 1 Complete!"
          - "========================================="
          - ""
          - "Summary:"
          - "  ✓ RHTPA installed and configured"
          - "  ✓ TPA Realm imported in Keycloak"
          - "  ✓ RHTPA instance deployed"
          - "  ✓ Example SBOM uploaded to RHTPA"
          - ""
