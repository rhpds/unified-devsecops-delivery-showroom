---
# Module 1: Install RHTPA and Upload SBOM
# Translates: solve-module-1.sh -> reset-module-1.sh + install-rhtpa.sh + upload-sbom.sh
- name: Solve Module 01 - RHTPA Installation
  hosts: localhost
  gather_facts: false

  vars:
    # Variables from user_data.yml (injected via -e @/user_data/user_data.yml)
    cluster_domain: "{{ openshift_cluster_ingress_domain }}"
    guid: "{{ guid }}"
    tpa_realm: "{{ tpa_realm }}"
    tpa_cli_client_secret: "{{ tpa_cli_client_secret }}"
    tpa_admin_username: "{{ tpa_admin_username }}"
    tpa_admin_password: "{{ tpa_admin_password }}"
    bastion_hostname: "{{ bastion_public_hostname }}"

    # Static variables (not in user_data)
    keycloak_namespace: "tssc-keycloak"
    tpa_namespace: "tssc-tpa"
    keycloak_url: "https://sso.{{ cluster_domain }}"
    sbom_file: "/home/lab-user/lab-assets/example-sbom.json"
    sbom_id: "test-sbom"
    lab_assets_dir: "/home/lab-user/lab-assets"

  tasks:
    - name: Display module information
      ansible.builtin.debug:
        msg: "Solving Module 01: RHTPA Installation and SBOM Upload"

    - name: Add bastion host to inventory
      ansible.builtin.add_host:
        name: "bastion"
        ansible_host: "{{ bastion_hostname }}"
        ansible_user: "{{ bastion_ssh_user_name }}"
        ansible_ssh_pass: "{{ bastion_ssh_password }}"
        ansible_port: "{{ bastion_ssh_port }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    ###########################################
    # STEP 0: Reset Module 1 (reset-module-1.sh)
    ###########################################
    - name: Check if RHTPA instance exists
      ansible.builtin.command:
        cmd: oc get tpa instance -n {{ tpa_namespace }}
      register: tpa_check
      changed_when: false
      failed_when: false
      delegate_to: bastion

    - name: Delete RHTPA instance (if exists)
      when: tpa_check.rc == 0
      block:
        - name: Delete RHTPA instance
          ansible.builtin.command:
            cmd: oc delete tpa instance -n {{ tpa_namespace }}
          changed_when: true
          delegate_to: bastion

        - name: Wait for RHTPA instance deletion
          ansible.builtin.command:
            cmd: oc wait --for=delete tpa/instance -n {{ tpa_namespace }} --timeout=300s
          changed_when: false
          failed_when: false
          delegate_to: bastion

        - name: Verify RHTPA instance deletion
          ansible.builtin.shell:
            cmd: |
              TIMEOUT=60
              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                if ! oc get tpa instance -n {{ tpa_namespace }} &>/dev/null; then
                  echo "deleted"
                  exit 0
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "timeout"
              exit 1
          register: tpa_verify
          changed_when: false
          failed_when: false
          delegate_to: bastion

        - name: Display RHTPA deletion result
          ansible.builtin.debug:
            msg: "{{ '✓ RHTPA instance deleted' if tpa_verify.stdout == 'deleted' else 'Warning: RHTPA instance still exists after timeout' }}"

    - name: RHTPA instance not found
      when: tpa_check.rc != 0
      ansible.builtin.debug:
        msg: "✓ RHTPA instance not found (already clean)"

    - name: Check if TPA CLI credentials secret exists
      ansible.builtin.command:
        cmd: oc get secret tpa-cli-credentials -n {{ tpa_namespace }}
      register: tpa_secret_check
      changed_when: false
      failed_when: false
      delegate_to: bastion

    - name: Delete TPA CLI credentials secret (if exists)
      when: tpa_secret_check.rc == 0
      block:
        - name: Delete TPA CLI credentials secret
          ansible.builtin.command:
            cmd: oc delete secret tpa-cli-credentials -n {{ tpa_namespace }}
          changed_when: true
          delegate_to: bastion

        - name: Verify TPA CLI credentials secret deletion
          ansible.builtin.command:
            cmd: oc get secret tpa-cli-credentials -n {{ tpa_namespace }}
          register: secret_verify
          changed_when: false
          failed_when: false
          delegate_to: bastion

        - name: Display secret deletion result
          ansible.builtin.debug:
            msg: "{{ '✓ TPA CLI credentials secret deleted' if secret_verify.rc != 0 else 'Warning: TPA CLI credentials secret still exists' }}"

    - name: TPA CLI credentials secret not found
      when: tpa_secret_check.rc != 0
      ansible.builtin.debug:
        msg: "✓ TPA CLI credentials secret not found (already clean)"

    - name: Check if TPA Realm import exists
      ansible.builtin.command:
        cmd: oc get keycloakrealmimport {{ tpa_realm }} -n {{ keycloak_namespace }}
      register: realm_check
      changed_when: false
      failed_when: false
      delegate_to: bastion

    - name: Delete TPA Realm import (if exists)
      when: realm_check.rc == 0
      block:
        - name: Delete TPA Realm import
          ansible.builtin.command:
            cmd: oc delete keycloakrealmimport {{ tpa_realm }} -n {{ keycloak_namespace }}
          changed_when: true
          delegate_to: bastion

        - name: Wait for TPA Realm deletion
          ansible.builtin.command:
            cmd: oc wait --for=delete keycloakrealmimport/{{ tpa_realm }} -n {{ keycloak_namespace }} --timeout=60s
          changed_when: false
          failed_when: false
          delegate_to: bastion

        - name: Verify TPA Realm deletion
          ansible.builtin.command:
            cmd: oc get keycloakrealmimport {{ tpa_realm }} -n {{ keycloak_namespace }}
          register: realm_verify
          changed_when: false
          failed_when: false
          delegate_to: bastion

        - name: Display realm deletion result
          ansible.builtin.debug:
            msg: "{{ '✓ TPA Realm import deleted' if realm_verify.rc != 0 else 'Warning: TPA Realm import still exists' }}"

    - name: TPA Realm import not found
      when: realm_check.rc != 0
      ansible.builtin.debug:
        msg: "✓ TPA Realm import not found (already clean)"

    - name: Reset complete
      ansible.builtin.debug:
        msg: "✓ Module 1 reset complete"

    ###########################################
    # STEP 1: Install RHTPA (install-rhtpa.sh)
    ###########################################
    - name: Import TPA Realm to Keycloak
      ansible.builtin.shell:
        cmd: |
          envsubst '${TPA_REALM} ${TPA_CLI_CLIENT_SECRET} ${TPA_ADMIN_USERNAME} ${TPA_ADMIN_PASSWORD}' \
            < {{ lab_assets_dir }}/keycloak-tpa-realm.yml | oc apply -n {{ keycloak_namespace }} -f -
      environment:
        TPA_REALM: "{{ tpa_realm }}"
        TPA_CLI_CLIENT_SECRET: "{{ tpa_cli_client_secret }}"
        TPA_ADMIN_USERNAME: "{{ tpa_admin_username }}"
        TPA_ADMIN_PASSWORD: "{{ tpa_admin_password }}"
      changed_when: true
      no_log: false
      delegate_to: bastion

    - name: Wait for TPA Realm import completion
      ansible.builtin.command:
        cmd: oc wait --for=condition=Done keycloakrealmimport/{{ tpa_realm }} -n {{ keycloak_namespace }} --timeout=300s
      changed_when: false
      delegate_to: bastion

    - name: Display TPA Realm import result
      ansible.builtin.debug:
        msg: "✓ TPA Realm imported successfully"

    - name: Configure TPA Client Secret
      ansible.builtin.shell:
        cmd: |
          envsubst < {{ lab_assets_dir }}/tpa-cli-credentials.yml | oc apply -n {{ tpa_namespace }} -f -
      environment:
        TPA_CLI_CLIENT_SECRET: "{{ tpa_cli_client_secret }}"
      changed_when: true
      no_log: false
      delegate_to: bastion

    - name: Display client secret configuration result
      ansible.builtin.debug:
        msg: "✓ Client secret configured"

    - name: Deploy RHTPA Instance
      ansible.builtin.shell:
        cmd: |
          envsubst < {{ lab_assets_dir }}/tpa-instance.yml | oc apply -n {{ tpa_namespace }} -f -
      environment:
        KEYCLOAK_URL: "{{ keycloak_url }}"
        TPA_REALM: "{{ tpa_realm }}"
      changed_when: true
      delegate_to: bastion

    - name: Wait for RHTPA server to be ready
      ansible.builtin.uri:
        url: "https://server-{{ tpa_namespace }}.{{ cluster_domain }}"
        validate_certs: false
        status_code:
          - 200
          - 302
          - 401
      register: rhtpa_ready
      until: rhtpa_ready.status in [200, 302, 401]
      retries: 60
      delay: 10
      changed_when: false
      delegate_to: localhost

    - name: Display RHTPA installation result
      ansible.builtin.debug:
        msg:
          - "✓ RHTPA installed successfully"
          - "Console: https://server-{{ tpa_namespace }}.{{ cluster_domain }}"
          - "Username: {{ tpa_admin_username }}"

    ###########################################
    # STEP 2: Upload SBOM (upload-sbom.sh)
    ###########################################
    - name: Check TPA endpoint availability
      ansible.builtin.uri:
        url: "https://server-{{ tpa_namespace }}.{{ cluster_domain }}"
        validate_certs: false
        status_code:
          - 200
          - 302
          - 401
      register: tpa_endpoint_check
      until: tpa_endpoint_check.status in [200, 302, 401]
      retries: 30
      delay: 10
      changed_when: false
      delegate_to: localhost

    - name: Display TPA endpoint status
      ansible.builtin.debug:
        msg: "✓ TPA endpoint is ready"

    - name: Get Keycloak OIDC configuration
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/realms/{{ tpa_realm }}/.well-known/openid-configuration"
        method: GET
        return_content: true
        validate_certs: false
        status_code: 200
      register: oidc_config
      until: oidc_config.status == 200 and oidc_config.json.token_endpoint is defined
      retries: 24
      delay: 5
      changed_when: false
      delegate_to: localhost

    - name: Display token endpoint status
      ansible.builtin.debug:
        msg: "✓ Token endpoint available"

    - name: Get OAuth access token
      ansible.builtin.uri:
        url: "{{ oidc_config.json.token_endpoint }}"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: cli
          client_secret: "{{ tpa_cli_client_secret }}"
        return_content: true
        validate_certs: false
        status_code: 200
      register: oauth_response
      changed_when: false
      no_log: false
      delegate_to: localhost

    - name: Set OAuth token fact
      ansible.builtin.set_fact:
        oauth_token: "{{ oauth_response.json.access_token }}"
      no_log: false

    - name: Display OAuth token status
      ansible.builtin.debug:
        msg: "✓ OAuth access token obtained"

    - name: Read SBOM file from bastion
      ansible.builtin.slurp:
        src: "{{ sbom_file }}"
      register: sbom_content
      delegate_to: bastion

    - name: Upload SBOM to RHTPA
      ansible.builtin.uri:
        url: "https://server-{{ tpa_namespace }}.{{ cluster_domain }}/api/v2/sbom?id={{ sbom_id }}"
        method: POST
        body: "{{ sbom_content.content | b64decode }}"
        headers:
          Authorization: "Bearer {{ oauth_token }}"
          Content-Type: "application/json"
        validate_certs: false
        status_code: [200, 201]
      changed_when: true
      no_log: false
      delegate_to: localhost

    - name: SBOM upload complete
      ansible.builtin.debug:
        msg:
          - "✓ SBOM uploaded successfully"
          - "SBOM ID: {{ sbom_id }}"
          - "Console: https://server-{{ tpa_namespace }}.{{ cluster_domain }}"

    ###########################################
    # Module Summary
    ###########################################
    - name: Module 1 completion summary
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "Module 1 Complete!"
          - "========================================="
          - ""
          - "Summary:"
          - "  ✓ RHTPA installed and configured"
          - "  ✓ TPA Realm imported in Keycloak"
          - "  ✓ RHTPA instance deployed"
          - "  ✓ Example SBOM uploaded to RHTPA"
          - ""
