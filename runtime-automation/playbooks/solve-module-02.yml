---
# Module 2: Install RHTAS and Test Image Signing
# Translates: solve-module-2.sh (exact implementation from scripts)
# Based on: reset-module-2.sh + install-rhtas.sh + test-image-signing.sh
- name: Solve Module 02 - RHTAS Installation
  hosts: localhost
  gather_facts: false

  vars:
    # Variables from user_data.yml (injected via -e @/user_data/user_data.yml)
    cluster_domain: "{{ openshift_cluster_ingress_domain }}"
    guid: "{{ guid }}"
    bastion_hostname: "{{ bastion_public_hostname }}"
    quay_token: "{{ quay_admin_token }}"

    # Static variables
    keycloak_url: "https://sso.{{ cluster_domain }}"
    keycloak_namespace: "tssc-keycloak"
    tas_namespace: "tssc-tas"
    pipelines_namespace: "openshift-pipelines"
    app_ci_namespace: "tssc-app-ci"
    quay_namespace: "quay-enterprise"
    tas_chains_realm: "tas-chains"
    tas_sso_realm: "sso"
    tas_client_id: "trusted-artifact-signer"
    quay_org: "tssc"
    quay_repo: "tekton-chains-test"
    lab_assets_dir: "/home/lab-user/lab-assets"
    test_sa: "chains-signing-image-tester"
    registry_secret: "tssc-image-registry-auth"

  module_defaults:
    group/kubernetes.core.k8s:
      host: "{{ openshift_api_server_url }}"
      api_key: "{{ hostvars['localhost']['openshift_token'] | default('') }}"
      validate_certs: false

  tasks:
    - name: Add bastion host to inventory
      ansible.builtin.add_host:
        name: "bastion"
        ansible_host: "{{ bastion_hostname }}"
        ansible_user: "{{ bastion_ssh_user_name }}"
        ansible_ssh_pass: "{{ bastion_ssh_password }}"
        ansible_port: "{{ bastion_ssh_port }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Login to OpenShift and get token
      ansible.builtin.shell: |
          oc login {{ openshift_api_server_url }} -u {{ openshift_cluster_admin_username }} -p {{ openshift_cluster_admin_password }} --insecure-skip-tls-verify=true
          oc whoami -t
      register: oc_login_result
      changed_when: false
      no_log: true

    - name: Set OpenShift token fact
      ansible.builtin.set_fact:
        openshift_token: "{{ oc_login_result.stdout_lines[-1] }}"
      no_log: true

    - name: Display module information
      ansible.builtin.debug:
        msg: "Solving Module 02: RHTAS Installation and Image Signing"

    ###########################################
    # STEP 0: Reset Module 2 (reset-module-2.sh)
    ###########################################
    - name: "STEP 0: Reset Module 2"
      delegate_to: bastion
      block:
        - name: "Step 1: Reverting Tekton Chains configuration"
          ansible.builtin.debug:
            msg: "Step 1: Reverting Tekton Chains configuration..."

        - name: Reset Tekton Chains to default configuration - remove all fields
          ansible.builtin.shell: |
              CHAIN_FIELDS=(
                "artifacts.oci.format"
                "artifacts.oci.signer"
                "artifacts.oci.storage"
                "artifacts.pipelinerun.format"
                "artifacts.pipelinerun.storage"
                "artifacts.taskrun.format"
                "artifacts.taskrun.signer"
                "artifacts.taskrun.storage"
                "disabled"
                "options"
                "signers.x509.fulcio.address"
                "signers.x509.fulcio.enabled"
                "signers.x509.fulcio.issuer"
                "signers.x509.identity.token.file"
                "signers.x509.tuf.mirror.url"
                "transparency.enabled"
                "transparency.url"
              )
              for field in "${CHAIN_FIELDS[@]}"; do
                oc patch tektonconfig config -n {{ pipelines_namespace }} --type=json -p="[{\"op\": \"remove\", \"path\": \"/spec/chain/$field\"}]" 2>/dev/null || true
              done
          changed_when: true

        - name: Display Tekton Chains configuration reverted
          ansible.builtin.debug:
            msg: "✓ Tekton Chains configuration reverted"

        - name: "Step 2: Deleting OIDC refresher app"
          ansible.builtin.debug:
            msg: "Step 2: Deleting OIDC refresher app..."

        - name: Check if OIDC refresher deployment exists
          ansible.builtin.shell: |
            oc get deployment oidc-token-refresher -n {{ pipelines_namespace }}
          register: oidc_deployment_check
          changed_when: false
          failed_when: false

        - name: Delete OIDC refresher deployment
          when: oidc_deployment_check.rc == 0
          block:
            - name: Delete deployment
              ansible.builtin.shell: |
                oc delete deployment oidc-token-refresher -n {{ pipelines_namespace }}
              changed_when: true

            - name: Verify deployment deletion
              ansible.builtin.shell: |
                oc get deployment oidc-token-refresher -n {{ pipelines_namespace }}
              register: verify_deployment
              changed_when: false
              failed_when: false

            - name: Display deployment deletion result
              ansible.builtin.debug:
                msg: "{{ '✓ OIDC refresher deployment deleted' if verify_deployment.rc != 0 else 'Warning: OIDC refresher deployment still exists' }}"

        - name: Display deployment not found
          when: oidc_deployment_check.rc != 0
          ansible.builtin.debug:
            msg: "✓ OIDC refresher deployment not found (already clean)"

        - name: Check if OIDC refresher service exists
          ansible.builtin.shell: |
            oc get service oidc-token-refresher -n {{ pipelines_namespace }}
          register: oidc_service_check
          changed_when: false
          failed_when: false

        - name: Delete OIDC refresher service
          when: oidc_service_check.rc == 0
          block:
            - name: Delete service
              ansible.builtin.shell: |
                oc delete service oidc-token-refresher -n {{ pipelines_namespace }}
              changed_when: true

            - name: Verify service deletion
              ansible.builtin.shell: |
                oc get service oidc-token-refresher -n {{ pipelines_namespace }}
              register: verify_service
              changed_when: false
              failed_when: false

            - name: Display service deletion result
              ansible.builtin.debug:
                msg: "{{ '✓ OIDC refresher service deleted' if verify_service.rc != 0 else 'Warning: OIDC refresher service still exists' }}"

        - name: Display service not found
          when: oidc_service_check.rc != 0
          ansible.builtin.debug:
            msg: "✓ OIDC refresher service not found (already clean)"

        - name: Check if oidc-info secret exists
          ansible.builtin.shell: |
            oc get secret oidc-info -n {{ pipelines_namespace }}
          register: oidc_info_check
          changed_when: false
          failed_when: false

        - name: Delete oidc-info secret
          when: oidc_info_check.rc == 0
          block:
            - name: Delete oidc-info secret
              ansible.builtin.shell: |
                oc delete secret oidc-info -n {{ pipelines_namespace }}
              changed_when: true

            - name: Verify oidc-info deletion
              ansible.builtin.shell: |
                oc get secret oidc-info -n {{ pipelines_namespace }}
              register: verify_oidc_info
              changed_when: false
              failed_when: false

            - name: Display oidc-info deletion result
              ansible.builtin.debug:
                msg: "{{ '✓ OIDC info secret deleted' if verify_oidc_info.rc != 0 else 'Warning: OIDC info secret still exists' }}"

        - name: Display oidc-info not found
          when: oidc_info_check.rc != 0
          ansible.builtin.debug:
            msg: "✓ OIDC info secret not found (already clean)"

        - name: Check if oidc-token secret exists
          ansible.builtin.shell: |
            oc get secret oidc-token -n {{ pipelines_namespace }}
          register: oidc_token_check
          changed_when: false
          failed_when: false

        - name: Delete oidc-token secret
          when: oidc_token_check.rc == 0
          block:
            - name: Delete oidc-token secret
              ansible.builtin.shell: |
                oc delete secret oidc-token -n {{ pipelines_namespace }}
              changed_when: true

            - name: Verify oidc-token deletion
              ansible.builtin.shell: |
                oc get secret oidc-token -n {{ pipelines_namespace }}
              register: verify_oidc_token
              changed_when: false
              failed_when: false

            - name: Display oidc-token deletion result
              ansible.builtin.debug:
                msg: "{{ '✓ OIDC token secret deleted' if verify_oidc_token.rc != 0 else 'Warning: OIDC token secret still exists' }}"

        - name: Display oidc-token not found
          when: oidc_token_check.rc != 0
          ansible.builtin.debug:
            msg: "✓ OIDC token secret not found (already clean)"

        - name: Display OIDC refresher app removed
          ansible.builtin.debug:
            msg: "✓ OIDC refresher app removed"

        - name: "Step 3: Deleting RHTAS instance"
          ansible.builtin.debug:
            msg: "Step 3: Deleting RHTAS instance..."

        - name: Check if SecureSign instance exists
          ansible.builtin.shell: |
            oc get securesign trusted-artifact-signer -n {{ tas_namespace }}
          register: securesign_check
          changed_when: false
          failed_when: false

        - name: Delete SecureSign instance
          when: securesign_check.rc == 0
          block:
            - name: Delete RHTAS SecureSign instance
              ansible.builtin.shell: |
                oc delete securesign trusted-artifact-signer -n {{ tas_namespace }}
              changed_when: true

            - name: Wait for RHTAS instance to be fully deleted
              ansible.builtin.debug:
                msg: "Waiting for RHTAS instance to be fully deleted..."

            - name: Wait for SecureSign deletion
              ansible.builtin.shell: |
                oc wait --for=delete securesign/trusted-artifact-signer -n {{ tas_namespace }} --timeout=300s
              changed_when: false
              failed_when: false

            - name: Verify SecureSign deletion with timeout
              ansible.builtin.shell: |
                  TIMEOUT=60
                  ELAPSED=0
                  while [ $ELAPSED -lt $TIMEOUT ]; do
                    if ! oc get securesign trusted-artifact-signer -n {{ tas_namespace }} 2>/dev/null; then
                      echo "deleted"
                      exit 0
                    fi
                    sleep 5
                    ELAPSED=$((ELAPSED + 5))
                  done
                  echo "still_exists"
              register: verify_securesign
              changed_when: false

            - name: Display SecureSign deletion result
              ansible.builtin.debug:
                msg: "{{ '✓ RHTAS instance deleted' if verify_securesign.stdout == 'deleted' else 'Warning: RHTAS instance still exists after timeout' }}"

        - name: Display SecureSign not found
          when: securesign_check.rc != 0
          ansible.builtin.debug:
            msg: "✓ RHTAS instance not found (already clean)"

        - name: Wait for all pods to terminate
          ansible.builtin.debug:
            msg: "Checking for remaining pods in {{ tas_namespace }}..."

        - name: Check and wait for pods to terminate
          ansible.builtin.shell: |
              TIMEOUT=120
              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                POD_COUNT=$(oc get pods -n {{ tas_namespace }} --no-headers 2>/dev/null | wc -l)
                if [ "$POD_COUNT" -eq 0 ]; then
                  echo "all_deleted"
                  exit 0
                fi
                echo "Pods still present ($POD_COUNT), waiting..."
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              POD_COUNT=$(oc get pods -n {{ tas_namespace }} --no-headers 2>/dev/null | wc -l)
              echo "timeout:$POD_COUNT"
          register: pods_termination
          changed_when: false

        - name: Display pod termination result
          ansible.builtin.debug:
            msg: "{{ '✓ All pods deleted' if pods_termination.stdout == 'all_deleted' else 'Warning: ' + pods_termination.stdout.split(':')[1] + ' pod(s) still exist after timeout' }}"
          when: pods_termination.stdout != 'all_deleted'

        - name: Display all pods deleted
          ansible.builtin.debug:
            msg: "✓ All pods deleted"
          when: pods_termination.stdout == 'all_deleted'

        - name: Delete all PVCs in TAS namespace
          ansible.builtin.debug:
            msg: "Deleting PVCs in {{ tas_namespace }}..."

        - name: Get PVC count
          ansible.builtin.shell: |
            cmd: oc get pvc -n {{ tas_namespace }} --no-headers 2>/dev/null | wc -l || echo 0
          register: pvc_count
          changed_when: false

        - name: Delete PVCs if they exist
          when: pvc_count.stdout | int > 0
          block:
            - name: Delete all PVCs
              ansible.builtin.shell: |
                oc delete pvc --all -n {{ tas_namespace }}
              changed_when: true

            - name: Display PVC deletion result
              ansible.builtin.debug:
                msg: "✓ Deleted {{ pvc_count.stdout }} PVC(s)"

        - name: Display no PVCs found
          when: pvc_count.stdout | int == 0
          ansible.builtin.debug:
            msg: "✓ No PVCs found"

        - name: "Step 4: Deleting Keycloak clients and realm"
          ansible.builtin.debug:
            msg: "Step 4: Deleting Keycloak clients and realm..."

        - name: Get Keycloak admin credentials
          ansible.builtin.shell: |
              ADMIN_USER=$(oc get secret keycloak-initial-admin -n {{ keycloak_namespace }} -o jsonpath='{.data.username}' | base64 -d)
              ADMIN_PASS=$(oc get secret keycloak-initial-admin -n {{ keycloak_namespace }} -o jsonpath='{.data.password}' | base64 -d)
              echo "${ADMIN_USER}:${ADMIN_PASS}"
          register: keycloak_admin_creds
          changed_when: false
          no_log: true

        - name: Get Keycloak admin token
          ansible.builtin.shell: |
              ADMIN_USER=$(echo "{{ keycloak_admin_creds.stdout }}" | cut -d: -f1)
              ADMIN_PASS=$(echo "{{ keycloak_admin_creds.stdout }}" | cut -d: -f2)
              ADMIN_TOKEN=$(curl -s -X POST "{{ keycloak_url }}/realms/master/protocol/openid-connect/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "client_id=admin-cli" \
                -d "username=${ADMIN_USER}" \
                -d "password=${ADMIN_PASS}" \
                -d "grant_type=password" | jq -r '.access_token')
              echo "$ADMIN_TOKEN"
          register: admin_token
          changed_when: false
          no_log: true

        - name: Process Keycloak client and realm deletion
          when: admin_token.stdout != "" and admin_token.stdout != "null"
          block:
            - name: Get trusted-artifact-signer client ID from sso realm
              ansible.builtin.shell: |
                  SSO_CLIENT_ID=$(curl -s -H "Authorization: Bearer {{ admin_token.stdout }}" \
                    "{{ keycloak_url }}/admin/realms/{{ tas_sso_realm }}/clients?clientId={{ tas_client_id }}" | jq -r '.[0].id // empty')
                  echo "$SSO_CLIENT_ID"
              register: sso_client_id
              changed_when: false
              no_log: true

            - name: Delete trusted-artifact-signer client from sso realm
              when: sso_client_id.stdout != ""
              block:
                - name: Delete client from sso realm
                  ansible.builtin.shell: |
                      curl -s -X DELETE "{{ keycloak_url }}/admin/realms/{{ tas_sso_realm }}/clients/{{ sso_client_id.stdout }}" \
                        -H "Authorization: Bearer {{ admin_token.stdout }}"
                  changed_when: true
                  no_log: true

                - name: Verify client deletion from sso realm
                  ansible.builtin.shell: |
                      VERIFY_CLIENT=$(curl -s -H "Authorization: Bearer {{ admin_token.stdout }}" \
                        "{{ keycloak_url }}/admin/realms/{{ tas_sso_realm }}/clients?clientId={{ tas_client_id }}" | jq -r '.[0].id // empty')
                      echo "$VERIFY_CLIENT"
                  register: verify_sso_client
                  changed_when: false
                  no_log: true

                - name: Display client deletion result
                  ansible.builtin.debug:
                    msg: "{{ '✓ Deleted ' + tas_client_id + ' client from ' + tas_sso_realm + ' realm' if verify_sso_client.stdout == '' else 'Warning: ' + tas_client_id + ' client still exists in ' + tas_sso_realm + ' realm' }}"

            - name: Display client not found in sso realm
              when: sso_client_id.stdout == ""
              ansible.builtin.debug:
                msg: "✓ {{ tas_client_id }} client not found in {{ tas_sso_realm }} realm"

            - name: Check if tas-chains realm exists
              ansible.builtin.shell: |
                  REALM_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
                    -H "Authorization: Bearer {{ admin_token.stdout }}" \
                    "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}")
                  echo "$REALM_EXISTS"
              register: realm_exists
              changed_when: false
              no_log: true

            - name: Delete tas-chains realm
              when: realm_exists.stdout == "200"
              block:
                - name: Delete realm
                  ansible.builtin.shell: |
                      curl -s -X DELETE "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}" \
                        -H "Authorization: Bearer {{ admin_token.stdout }}"
                  changed_when: true
                  no_log: true

                - name: Verify realm deletion
                  ansible.builtin.shell: |
                      VERIFY_REALM=$(curl -s -o /dev/null -w "%{http_code}" \
                        -H "Authorization: Bearer {{ admin_token.stdout }}" \
                        "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}")
                      echo "$VERIFY_REALM"
                  register: verify_realm
                  changed_when: false
                  no_log: true

                - name: Display realm deletion result
                  ansible.builtin.debug:
                    msg: "{{ '✓ Deleted ' + tas_chains_realm + ' realm' if verify_realm.stdout != '200' else 'Warning: ' + tas_chains_realm + ' realm still exists' }}"

            - name: Display realm not found
              when: realm_exists.stdout != "200"
              ansible.builtin.debug:
                msg: "✓ {{ tas_chains_realm }} realm not found"

        - name: Display warning if Keycloak auth failed
          when: admin_token.stdout == "" or admin_token.stdout == "null"
          ansible.builtin.debug:
            msg: "Warning: Failed to authenticate with Keycloak, skipping client/realm deletion"

        - name: "Step 5: Cleaning up test TaskRuns"
          ansible.builtin.debug:
            msg: "Step 5: Cleaning up test TaskRuns..."

        - name: Get TaskRun count with test label
          ansible.builtin.shell: |
            cmd: oc get taskrun -n {{ app_ci_namespace }} -l test.workload.security.redhat.com/test=image-signing --no-headers 2>/dev/null | wc -l || echo 0
          register: taskrun_count
          changed_when: false

        - name: Delete test TaskRuns
          when: taskrun_count.stdout | int > 0
          block:
            - name: Delete TaskRuns with test label
              ansible.builtin.shell: |
                oc delete taskrun -n {{ app_ci_namespace }} -l test.workload.security.redhat.com/test=image-signing
              changed_when: true

            - name: Display TaskRun deletion result
              ansible.builtin.debug:
                msg: "✓ Deleted {{ taskrun_count.stdout }} test TaskRun(s)"

        - name: Display no test TaskRuns found
          when: taskrun_count.stdout | int == 0
          ansible.builtin.debug:
            msg: "✓ No test TaskRuns found"

        - name: Get orphaned TaskRun count
          ansible.builtin.shell: |
            cmd: oc get taskrun -n {{ app_ci_namespace }} -l tekton.dev/task=build-and-push --no-headers 2>/dev/null | wc -l || echo 0
          register: orphaned_count
          changed_when: false

        - name: Delete orphaned TaskRuns
          when: orphaned_count.stdout | int > 0
          block:
            - name: Delete orphaned TaskRuns
              ansible.builtin.shell: |
                oc delete taskrun -n {{ app_ci_namespace }} -l tekton.dev/task=build-and-push
              changed_when: true

            - name: Display orphaned TaskRun deletion result
              ansible.builtin.debug:
                msg: "✓ Deleted {{ orphaned_count.stdout }} orphaned TaskRun(s)"

        - name: "Step 6: Deleting Quay test repository"
          ansible.builtin.debug:
            msg: "Step 6: Deleting Quay test repository..."

        - name: Get Quay route
          ansible.builtin.shell: |
            oc get route -n {{ quay_namespace }} -l quay-component=quay-app-route -o jsonpath='{.items[0].spec.host}' 2>/dev/null || echo ""
          register: quay_url
          changed_when: false

        - name: Process Quay repository deletion
          when: quay_url.stdout != ""
          block:
            - name: Display Quay URL
              ansible.builtin.debug:
                msg:
                  - "Quay URL: https://{{ quay_url.stdout }}"
                  - "Checking repository: {{ quay_org }}/{{ quay_repo }}"

            - name: Check Quay token
              when: quay_token != "changeme" and quay_token != ""
              block:
                - name: Check if Quay repository exists
                  ansible.builtin.shell: |
                      CHECK_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" \
                        -H "Authorization: Bearer {{ quay_token }}" \
                        "https://{{ quay_url.stdout }}/api/v1/repository/{{ quay_org }}/{{ quay_repo }}" || true)
                      echo "$CHECK_CODE"
                  register: repo_check
                  changed_when: false
                  no_log: true

                - name: Display repository not found
                  when: repo_check.stdout == "404"
                  ansible.builtin.debug:
                    msg: "✓ Quay repository not found (already clean): {{ quay_org }}/{{ quay_repo }}"

                - name: Delete repository if exists
                  when: repo_check.stdout == "200"
                  block:
                    - name: Display repository exists
                      ansible.builtin.debug:
                        msg: "Repository exists, deleting..."

                    - name: Delete Quay repository
                      ansible.builtin.shell: |
                          HTTP_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" -X DELETE \
                            -H "Authorization: Bearer {{ quay_token }}" \
                            "https://{{ quay_url.stdout }}/api/v1/repository/{{ quay_org }}/{{ quay_repo }}" || true)
                          echo "$HTTP_CODE"
                      register: delete_result
                      changed_when: delete_result.stdout in ["204", "200"]
                      no_log: true

                    - name: Display repository deletion result
                      ansible.builtin.debug:
                        msg: "{{ '✓ Quay repository deleted: ' + quay_org + '/' + quay_repo if delete_result.stdout in ['204', '200'] else 'Warning: Failed to delete Quay repository (HTTP: ' + delete_result.stdout + ')' }}"

                - name: Display auth failed
                  when: repo_check.stdout == "401"
                  ansible.builtin.debug:
                    msg:
                      - "Warning: Authentication failed for Quay (HTTP: 401)"
                      - "  Check QUAY_TOKEN is valid"
                      - "  Skipping deletion"

                - name: Display check failed
                  when: repo_check.stdout not in ["404", "200", "401"]
                  ansible.builtin.debug:
                    msg:
                      - "Warning: Could not check Quay repository (HTTP: {{ repo_check.stdout }})"
                      - "  Skipping deletion"

            - name: Display missing token warning
              when: quay_token == "changeme" or quay_token == ""
              ansible.builtin.debug:
                msg:
                  - "Warning: QUAY_TOKEN not set, skipping repository deletion"
                  - "  Set QUAY_TOKEN environment variable before running this script"

        - name: Display Quay route not found
          when: quay_url.stdout == ""
          ansible.builtin.debug:
            msg: "Warning: Could not find Quay route, skipping repository deletion"

        - name: Reset Module 2 complete
          ansible.builtin.debug:
            msg:
              - "========================================="
              - "Module 2 Reset Complete!"
              - "========================================="
              - ""
              - "Cleaned up:"
              - "  ✓ Tekton Chains configuration reverted"
              - "  ✓ OIDC refresher app removed"
              - "  ✓ OIDC info and token secrets removed"
              - "  ✓ RHTAS instance removed (Fulcio, Rekor, TUF)"
              - "  ✓ tas-chains realm deleted from Keycloak"
              - "  ✓ trusted-artifact-signer client removed from sso realm"
              - "  ✓ Test TaskRuns cleaned up"
              - "  ✓ Quay test repository removed (tssc/tekton-chains-test)"

    ###########################################
    # STEP 1: Install RHTAS (install-rhtas.sh)
    ###########################################
    - name: "STEP 1: Install RHTAS"
      delegate_to: bastion
      block:
        - name: Display RHTAS installation start
          ansible.builtin.debug:
            msg:
              - "========================================="
              - "Installing RHTAS"
              - "========================================="

        - name: Retrieve Keycloak admin credentials
          ansible.builtin.debug:
            msg: "Retrieving Keycloak admin credentials..."

        - name: Get Keycloak admin credentials
          ansible.builtin.shell: |
              KEYCLOAK_ADMIN_USER=$(oc get secret keycloak-initial-admin -n {{ keycloak_namespace }} -o jsonpath='{.data.username}' | base64 -d)
              KEYCLOAK_ADMIN_PASSWORD=$(oc get secret keycloak-initial-admin -n {{ keycloak_namespace }} -o jsonpath='{.data.password}' | base64 -d)
              echo "${KEYCLOAK_ADMIN_USER}:${KEYCLOAK_ADMIN_PASSWORD}"
          register: kc_admin_creds
          changed_when: false
          no_log: true

        - name: Authenticate with Keycloak
          ansible.builtin.debug:
            msg: "Authenticating with Keycloak..."

        - name: Get Keycloak admin access token
          ansible.builtin.shell: |
              ADMIN_USER=$(echo "{{ kc_admin_creds.stdout }}" | cut -d: -f1)
              ADMIN_PASS=$(echo "{{ kc_admin_creds.stdout }}" | cut -d: -f2)
              ADMIN_TOKEN=$(curl -s -X POST "{{ keycloak_url }}/realms/master/protocol/openid-connect/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "client_id=admin-cli" \
                -d "username=${ADMIN_USER}" \
                -d "password=${ADMIN_PASS}" \
                -d "grant_type=password" | jq -r '.access_token')
              echo "$ADMIN_TOKEN"
          register: kc_admin_token
          changed_when: false
          failed_when: kc_admin_token.stdout == "" or kc_admin_token.stdout == "null"
          no_log: true

        - name: Display Keycloak authentication success
          ansible.builtin.debug:
            msg: "✓ Authenticated with Keycloak"

        - name: "Step 1: Configure Machine Identity (Tekton Chains)"
          ansible.builtin.debug:
            msg:
              - "Step 1: Configure Machine Identity (Tekton Chains)"
              - "---------------------------------------------------"

        - name: "Step 1.2: Creating tas-chains realm"
          ansible.builtin.debug:
            msg: "Step 1.2: Creating tas-chains realm..."

        - name: Check if tas-chains realm exists
          ansible.builtin.shell: |
              REALM_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}")
              echo "$REALM_EXISTS"
          register: check_realm
          changed_when: false
          no_log: true

        - name: Create tas-chains realm if it doesn't exist
          when: check_realm.stdout == "404"
          block:
            - name: Create realm
              ansible.builtin.shell: |
                  curl -s -X POST "{{ keycloak_url }}/admin/realms" \
                    -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"realm\": \"{{ tas_chains_realm }}\",
                      \"enabled\": true
                    }"
              changed_when: true
              no_log: true

            - name: Display realm creation result
              ansible.builtin.debug:
                msg: "✓ Created tas-chains realm"

        - name: Display realm already exists
          when: check_realm.stdout != "404"
          ansible.builtin.debug:
            msg: "✓ tas-chains realm already exists"

        - name: "Step 1.3: Creating trusted-artifact-signer client in tas-chains realm"
          ansible.builtin.debug:
            msg: "Step 1.3: Creating {{ tas_client_id }} client in {{ tas_chains_realm }} realm..."

        - name: Check if client exists in tas-chains realm
          ansible.builtin.shell: |
              CLIENT_EXISTS=$(curl -s -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}/clients?clientId={{ tas_client_id }}" | jq -r '.[0].id // empty')
              echo "$CLIENT_EXISTS"
          register: check_client
          changed_when: false
          no_log: true

        - name: Create trusted-artifact-signer client if it doesn't exist
          when: check_client.stdout == ""
          block:
            - name: Create client
              ansible.builtin.shell: |
                  curl -s -X POST "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}/clients" \
                    -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"clientId\": \"{{ tas_client_id }}\",
                      \"enabled\": true,
                      \"clientAuthenticatorType\": \"client-secret\",
                      \"standardFlowEnabled\": true,
                      \"serviceAccountsEnabled\": true,
                      \"publicClient\": false,
                      \"frontchannelLogout\": false
                    }"
              changed_when: true
              no_log: true

            - name: Display client creation result
              ansible.builtin.debug:
                msg: "✓ Created {{ tas_client_id }} client"

        - name: Display client already exists
          when: check_client.stdout != ""
          ansible.builtin.debug:
            msg: "✓ {{ tas_client_id }} client already exists"

        - name: Get client ID for service account configuration
          ansible.builtin.shell: |
              CLIENT_ID=$(curl -s -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}/clients?clientId={{ tas_client_id }}" | jq -r '.[0].id')
              echo "$CLIENT_ID"
          register: tas_client_uuid
          changed_when: false
          no_log: true

        - name: Configure service account user
          ansible.builtin.debug:
            msg: "Configuring service account user..."

        - name: Get service account user ID
          ansible.builtin.shell: |
              SERVICE_ACCOUNT_USER=$(curl -s -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}/clients/{{ tas_client_uuid.stdout }}/service-account-user" | jq -r '.id')
              echo "$SERVICE_ACCOUNT_USER"
          register: service_account_user_id
          changed_when: false
          no_log: true

        - name: Update service account with email verification
          ansible.builtin.shell: |
              curl -s -X PUT "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}/users/{{ service_account_user_id.stdout }}" \
                -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                -H "Content-Type: application/json" \
                -d "{
                  \"emailVerified\": true,
                  \"email\": \"trusted-artifact-signer@demo.redhat.com\",
                  \"firstName\": \"Trusted\",
                  \"lastName\": \"Content\"
                }"
          changed_when: true
          no_log: true

        - name: Display service account configured
          ansible.builtin.debug:
            msg: "✓ Service account configured with verified email"

        - name: "Step 2: Configure Developer Identity for Commit Signing"
          ansible.builtin.debug:
            msg:
              - "Step 2: Configure Developer Identity for Commit Signing"
              - "--------------------------------------------------------"

        - name: "Step 2.1: Creating trusted-artifact-signer client in sso realm"
          ansible.builtin.debug:
            msg: "Step 2.1: Creating {{ tas_client_id }} client in {{ tas_sso_realm }} realm..."

        - name: Check if client exists in sso realm
          ansible.builtin.shell: |
              SSO_CLIENT_EXISTS=$(curl -s -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                "{{ keycloak_url }}/admin/realms/{{ tas_sso_realm }}/clients?clientId={{ tas_client_id }}" | jq -r '.[0].id // empty')
              echo "$SSO_CLIENT_EXISTS"
          register: check_sso_client
          changed_when: false
          no_log: true

        - name: Create trusted-artifact-signer client in sso realm if it doesn't exist
          when: check_sso_client.stdout == ""
          block:
            - name: Create client in sso realm
              ansible.builtin.shell: |
                  curl -s -X POST "{{ keycloak_url }}/admin/realms/{{ tas_sso_realm }}/clients" \
                    -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"clientId\": \"{{ tas_client_id }}\",
                      \"enabled\": true,
                      \"standardFlowEnabled\": true,
                      \"directAccessGrantsEnabled\": true,
                      \"publicClient\": true,
                      \"redirectUris\": [\"urn:ietf:wg:oauth:2.0:oob\", \"*\"],
                      \"frontchannelLogout\": false
                    }"
              changed_when: true
              no_log: true

            - name: Display sso client creation result
              ansible.builtin.debug:
                msg: "✓ Created {{ tas_client_id }} client in {{ tas_sso_realm }} realm"

        - name: Display sso client already exists
          when: check_sso_client.stdout != ""
          ansible.builtin.debug:
            msg: "✓ {{ tas_client_id }} client already exists in {{ tas_sso_realm }} realm"

        - name: "Step 3: Deploy RHTAS Instance"
          ansible.builtin.debug:
            msg:
              - "Step 3: Deploy RHTAS Instance"
              - "------------------------------"

        - name: "Step 3.1: Applying RHTAS Instance CR"
          ansible.builtin.debug:
            msg: "Step 3.1: Applying RHTAS Instance CR..."

        - name: Apply RHTAS Instance CR
          ansible.builtin.shell: |
              export TAS_CHAINS_CLIENT_ID="{{ tas_client_id }}"
              export TAS_CHAINS_REALM="{{ tas_chains_realm }}"
              export TAS_SSO_REALM="{{ tas_sso_realm }}"
              envsubst < $(eval echo "{{ lab_assets_dir }}/tas-instance.yml") | oc apply -n {{ tas_namespace }} -f -
          changed_when: true

        - name: Display RHTAS Instance CR applied
          ansible.builtin.debug:
            msg: "✓ RHTAS Instance CR applied"

        - name: "Step 3.2: Waiting for RHTAS instance status to be populated"
          ansible.builtin.debug:
            msg: "Step 3.2: Waiting for RHTAS instance status to be populated..."

        - name: Wait for RHTAS instance status URLs
          ansible.builtin.shell: |
              TIMEOUT=600
              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                FULCIO_URL=$(oc get securesign trusted-artifact-signer -n {{ tas_namespace }} -o jsonpath='{.status.fulcio.url}' 2>/dev/null || echo "")
                REKOR_URL=$(oc get securesign trusted-artifact-signer -n {{ tas_namespace }} -o jsonpath='{.status.rekor.url}' 2>/dev/null || echo "")
                TUF_URL=$(oc get securesign trusted-artifact-signer -n {{ tas_namespace }} -o jsonpath='{.status.tuf.url}' 2>/dev/null || echo "")

                if [ -n "$FULCIO_URL" ] && [ -n "$REKOR_URL" ] && [ -n "$TUF_URL" ]; then
                  echo "status_ready"
                  echo "$FULCIO_URL"
                  echo "$REKOR_URL"
                  echo "$TUF_URL"
                  exit 0
                fi
                echo "Waiting for RHTAS status URLs to be populated..." >&2
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "timeout"
              exit 1
          register: rhtas_status
          changed_when: false
          failed_when: rhtas_status.stdout_lines[0] == "timeout"

        - name: Display RHTAS instance status ready
          ansible.builtin.debug:
            msg:
              - "✓ RHTAS instance status populated"
              - "  Fulcio URL: {{ rhtas_status.stdout_lines[1] }}"
              - "  Rekor URL: {{ rhtas_status.stdout_lines[2] }}"
              - "  TUF URL: {{ rhtas_status.stdout_lines[3] }}"

        - name: "Step 4: Deploy OIDC Refresher App"
          ansible.builtin.debug:
            msg:
              - "Step 4: Deploy OIDC Refresher App"
              - "----------------------------------"

        - name: "Step 4.1: Retrieving client secret"
          ansible.builtin.debug:
            msg: "Step 4.1: Retrieving client secret..."

        - name: Get TAS client UUID
          ansible.builtin.shell: |
              TAS_CHAINS_CLIENT_ID_UUID=$(curl -s -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}/clients?clientId={{ tas_client_id }}" | jq -r '.[0].id')
              echo "$TAS_CHAINS_CLIENT_ID_UUID"
          register: tas_chains_client_uuid
          changed_when: false
          no_log: true

        - name: Get TAS client secret
          ansible.builtin.shell: |
              TAS_CHAINS_CLIENT_SECRET=$(curl -s -H "Authorization: Bearer {{ kc_admin_token.stdout }}" \
                "{{ keycloak_url }}/admin/realms/{{ tas_chains_realm }}/clients/{{ tas_chains_client_uuid.stdout }}/client-secret" | jq -r '.value')
              echo "$TAS_CHAINS_CLIENT_SECRET"
          register: tas_client_secret
          changed_when: false
          failed_when: tas_client_secret.stdout == "" or tas_client_secret.stdout == "null"
          no_log: true

        - name: Display client secret retrieved
          ansible.builtin.debug:
            msg: "✓ Client secret retrieved"

        - name: "Step 4.2: Creating OIDC info secret"
          ansible.builtin.debug:
            msg: "Step 4.2: Creating OIDC info secret..."

        - name: Create OIDC info secret
          ansible.builtin.shell: |
              export TAS_CHAINS_CLIENT_SECRET="{{ tas_client_secret.stdout }}"
              envsubst < $(eval echo "{{ lab_assets_dir }}/oidc-info-secret.yml") | oc apply -n {{ pipelines_namespace }} -f -
          changed_when: true
          no_log: true

        - name: Display OIDC info secret created
          ansible.builtin.debug:
            msg: "✓ OIDC info secret created"

        - name: "Step 4.3: Deploying OIDC refresher app"
          ansible.builtin.debug:
            msg: "Step 4.3: Deploying OIDC refresher app..."

        - name: Deploy OIDC refresher app
          ansible.builtin.shell: |
            cmd: oc apply -f $(eval echo "{{ lab_assets_dir }}/oidc-refresher-app.yml") -n {{ pipelines_namespace }}
          changed_when: true

        - name: Display OIDC refresher app deployed
          ansible.builtin.debug:
            msg: "✓ OIDC refresher app deployed"

        - name: "Step 4.4: Waiting for OIDC refresher pod to be Running"
          ansible.builtin.debug:
            msg: "Step 4.4: Waiting for OIDC refresher pod to be Running..."

        - name: Wait for OIDC refresher pod to be Running
          ansible.builtin.shell: |
              TIMEOUT=300
              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                REFRESHER_STATUS=$(oc get pods -n {{ pipelines_namespace }} -l app=oidc-token-refresher -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "NotFound")
                if [ "$REFRESHER_STATUS" == "Running" ]; then
                  echo "running"
                  exit 0
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "timeout"
              exit 1
          register: refresher_status
          changed_when: false
          failed_when: refresher_status.stdout == "timeout"

        - name: Display OIDC refresher pod running
          ansible.builtin.debug:
            msg: "✓ OIDC refresher pod is Running"

        - name: "Step 4.5: Waiting for oidc-token secret to have valid id-token"
          ansible.builtin.debug:
            msg: "Step 4.5: Waiting for oidc-token secret to have valid id-token..."

        - name: Wait for oidc-token secret to have valid id-token
          ansible.builtin.shell: |
              TIMEOUT=120
              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                ID_TOKEN=$(oc get secret oidc-token -n {{ pipelines_namespace }} -o jsonpath='{.data.id-token}' 2>/dev/null | base64 -d 2>/dev/null || true)
                if [ -n "$ID_TOKEN" ] && [[ "$ID_TOKEN" == eyJ* ]]; then
                  echo "valid"
                  exit 0
                fi
                echo "Waiting for oidc-token secret to be populated..." >&2
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "invalid"
              exit 1
          register: oidc_token_status
          changed_when: false
          failed_when: oidc_token_status.stdout == "invalid"

        - name: Display oidc-token secret valid
          ansible.builtin.debug:
            msg: "✓ oidc-token secret has valid id-token"

        - name: "Step 5: Configure Tekton Chains"
          ansible.builtin.debug:
            msg:
              - "Step 5: Configure Tekton Chains"
              - "--------------------------------"

        - name: "Step 5.1: Getting current tekton-chains-controller pod"
          ansible.builtin.debug:
            msg: "Step 5.1: Getting current tekton-chains-controller pod..."

        - name: Get current Tekton Chains controller pod name
          ansible.builtin.shell: |
            cmd: oc get pods -n {{ pipelines_namespace }} -l app=tekton-chains-controller -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "NotFound"
          register: old_chains_pod
          changed_when: false

        - name: Display current pod
          ansible.builtin.debug:
            msg: "Current pod: {{ old_chains_pod.stdout }}"

        - name: "Step 5.2: Patching Tekton configuration"
          ansible.builtin.debug:
            msg: "Step 5.2: Patching Tekton configuration..."

        - name: Patch Tekton Chains configuration
          ansible.builtin.shell: |
            cmd: oc patch tektonconfig config -n {{ pipelines_namespace }} --type=merge --patch "$(cat $(eval echo "{{ lab_assets_dir }}/tekton-chains-patch.yml"))"
          changed_when: true

        - name: Display Tekton Chains patch applied
          ansible.builtin.debug:
            msg: "✓ Tekton Chains patch applied"

        - name: "Step 5.3: Waiting for tekton-chains-controller pod to be recreated"
          ansible.builtin.debug:
            msg: "Step 5.3: Waiting for tekton-chains-controller pod to be recreated..."

        - name: Wait for tekton-chains-controller pod to be recreated and ready
          ansible.builtin.shell: |
              TIMEOUT=180
              ELAPSED=0
              OLD_CHAINS_POD="{{ old_chains_pod.stdout }}"
              while [ $ELAPSED -lt $TIMEOUT ]; do
                NEW_CHAINS_POD=$(oc get pods -n {{ pipelines_namespace }} -l app=tekton-chains-controller -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "NotFound")

                # Check if pod name changed
                if [ "$NEW_CHAINS_POD" != "$OLD_CHAINS_POD" ] && [ "$NEW_CHAINS_POD" != "NotFound" ]; then
                  # Check if new pod is ready
                  POD_READY=$(oc get pod ${NEW_CHAINS_POD} -n {{ pipelines_namespace }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "False")
                  if [ "$POD_READY" == "True" ]; then
                    echo "ready:${NEW_CHAINS_POD}"
                    exit 0
                  fi
                fi

                echo "Waiting for tekton-chains-controller pod to be recreated and ready..." >&2
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "timeout"
              exit 1
          register: new_chains_pod
          changed_when: false
          failed_when: new_chains_pod.stdout == "timeout"

        - name: Display Tekton Chains controller recreated
          ansible.builtin.debug:
            msg: "✓ Tekton Chains controller pod recreated and ready: {{ new_chains_pod.stdout.split(':')[1] }}"

        - name: RHTAS installation complete
          ansible.builtin.debug:
            msg:
              - "========================================="
              - "RHTAS Installation Complete!"
              - "========================================="
              - ""
              - "Components deployed:"
              - "  ✓ tas-chains realm created"
              - "  ✓ Machine identity configured"
              - "  ✓ Developer identity configured"
              - "  ✓ RHTAS instance deployed (Fulcio, Rekor, Trillian, TUF)"
              - "  ✓ OIDC token refresher running"
              - "  ✓ Tekton Chains configured for keyless signing"
              - ""
              - "Next step: Run test-image-signing.sh to verify the installation"

    ###########################################
    # STEP 2: Test Image Signing (test-image-signing.sh)
    ###########################################
    - name: "STEP 2: Test Image Signing"
      delegate_to: bastion
      block:
        - name: Display test start
          ansible.builtin.debug:
            msg:
              - "========================================="
              - "RHTAS Image Signing Smoke Test"
              - "========================================="

        - name: "Step 6.1: Setting up test permissions"
          ansible.builtin.debug:
            msg:
              - "Step 6.1: Setting up test permissions..."
              - "---------------------------------------"

        - name: Create service account
          ansible.builtin.debug:
            msg: "Creating service account: {{ test_sa }}..."

        - name: Create test service account
          ansible.builtin.shell: |
            cmd: oc create sa {{ test_sa }} -n {{ app_ci_namespace }} 2>/dev/null || echo "✓ Service account already exists"
          changed_when: false

        - name: Grant anyuid SCC
          ansible.builtin.debug:
            msg: "Granting anyuid SCC..."

        - name: Add anyuid SCC to service account
          ansible.builtin.shell: |
            oc adm policy add-scc-to-user anyuid -z {{ test_sa }} -n {{ app_ci_namespace }}
          changed_when: true

        - name: Grant privileged SCC
          ansible.builtin.debug:
            msg: "Granting privileged SCC..."

        - name: Add privileged SCC to service account
          ansible.builtin.shell: |
            oc adm policy add-scc-to-user privileged -z {{ test_sa }} -n {{ app_ci_namespace }}
          changed_when: true

        - name: Link registry secret
          ansible.builtin.debug:
            msg: "Linking registry secret..."

        - name: Link registry secret to service account
          ansible.builtin.shell: |
            cmd: oc secret link {{ test_sa }} {{ registry_secret }} -n {{ app_ci_namespace }} --for=mount 2>/dev/null || echo "✓ Secret already linked"
          changed_when: false

        - name: Display test permissions configured
          ansible.builtin.debug:
            msg: "✓ Test permissions configured"

        - name: "Step 6.2: Running Tekton build-and-push task"
          ansible.builtin.debug:
            msg:
              - "Step 6.2: Running Tekton build-and-push task..."
              - "-----------------------------------------------"

        - name: Apply the task
          ansible.builtin.debug:
            msg: "Applying Tekton task..."

        - name: Create Tekton task
          ansible.builtin.shell: |
            cmd: oc create -f $(eval echo "{{ lab_assets_dir }}/example-image-sign.yml") -n {{ app_ci_namespace }}
          changed_when: true

        - name: Display Tekton task created
          ansible.builtin.debug:
            msg: "✓ Tekton task created"

        - name: Wait for TaskRun to start
          ansible.builtin.debug:
            msg: "Waiting for TaskRun to start..."

        - name: Sleep 5 seconds
          ansible.builtin.pause:
            seconds: 5

        - name: Get TaskRun name
          ansible.builtin.shell: |
            cmd: oc get taskrun -n {{ app_ci_namespace }} --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}'
          register: taskrun_name
          changed_when: false
          failed_when: taskrun_name.stdout == ""

        - name: Display monitoring TaskRun
          ansible.builtin.debug:
            msg:
              - "Monitoring TaskRun: {{ taskrun_name.stdout }}"
              - ""

        - name: Wait for TaskRun to complete
          ansible.builtin.debug:
            msg: "Waiting for TaskRun to complete (this may take a few minutes)..."

        - name: Monitor TaskRun completion
          ansible.builtin.shell: |
              TIMEOUT=600
              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                TASKRUN_STATUS=$(oc get taskrun {{ taskrun_name.stdout }} -n {{ app_ci_namespace }} -o jsonpath='{.status.conditions[?(@.type=="Succeeded")].status}' 2>/dev/null || echo "Unknown")
                TASKRUN_REASON=$(oc get taskrun {{ taskrun_name.stdout }} -n {{ app_ci_namespace }} -o jsonpath='{.status.conditions[?(@.type=="Succeeded")].reason}' 2>/dev/null || echo "")

                if [ "$TASKRUN_STATUS" == "True" ]; then
                  IMAGE_URL=$(oc get taskrun {{ taskrun_name.stdout }} -n {{ app_ci_namespace }} -o jsonpath='{.status.results[?(@.name=="IMAGE_URL")].value}' 2>/dev/null || echo "N/A")
                  IMAGE_DIGEST=$(oc get taskrun {{ taskrun_name.stdout }} -n {{ app_ci_namespace }} -o jsonpath='{.status.results[?(@.name=="IMAGE_DIGEST")].value}' 2>/dev/null || echo "N/A")
                  echo "success"
                  echo "$IMAGE_URL"
                  echo "$IMAGE_DIGEST"
                  exit 0
                elif [ "$TASKRUN_STATUS" == "False" ]; then
                  echo "failed:$TASKRUN_REASON"
                  exit 1
                fi

                # Show progress every 30 seconds
                if [ $((ELAPSED % 30)) -eq 0 ]; then
                  echo "  Status: ${TASKRUN_STATUS:-Pending} (${ELAPSED}s elapsed)" >&2
                fi

                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "timeout"
              exit 1
          register: taskrun_result
          changed_when: false
          failed_when: taskrun_result.stdout_lines[0] != "success"

        - name: Handle TaskRun failure
          when: taskrun_result.stdout_lines[0] == "failed"
          block:
            - name: Display TaskRun failed
              ansible.builtin.debug:
                msg:
                  - "✗ TaskRun failed: {{ taskrun_result.stdout_lines[0].split(':')[1] }}"
                  - ""
                  - "TaskRun logs:"

            - name: Get TaskRun logs
              ansible.builtin.shell: |
                cmd: oc logs -n {{ app_ci_namespace }} --selector=tekton.dev/taskRun={{ taskrun_name.stdout }} --tail=50
              register: taskrun_logs
              changed_when: false

            - name: Display TaskRun logs
              ansible.builtin.debug:
                msg: "{{ taskrun_logs.stdout_lines }}"

            - name: Fail playbook
              ansible.builtin.fail:
                msg: "TaskRun failed"

        - name: Display TaskRun completed
          ansible.builtin.debug:
            msg:
              - "✓ TaskRun completed successfully"
              - ""
              - "Image Details:"
              - "  URL: {{ taskrun_result.stdout_lines[1] }}"
              - "  Digest: {{ taskrun_result.stdout_lines[2] }}"
              - ""

        - name: Wait for Tekton Chains to sign the image
          ansible.builtin.debug:
            msg: "Waiting for Tekton Chains to sign the image..."

        - name: Sleep 15 seconds for signing
          ansible.builtin.pause:
            seconds: 15

        - name: Display signing complete
          ansible.builtin.debug:
            msg: "✓ Signing should be complete"

        - name: "Step 6.5: Cleaning up test permissions"
          ansible.builtin.debug:
            msg:
              - "Step 6.5: Cleaning up test permissions..."
              - "-----------------------------------------"

        - name: Remove anyuid SCC
          ansible.builtin.debug:
            msg: "Removing anyuid SCC..."

        - name: Remove anyuid SCC from service account
          ansible.builtin.shell: |
            oc adm policy remove-scc-from-user anyuid -z {{ test_sa }} -n {{ app_ci_namespace }}
          changed_when: true

        - name: Remove privileged SCC
          ansible.builtin.debug:
            msg: "Removing privileged SCC..."

        - name: Remove privileged SCC from service account
          ansible.builtin.shell: |
            oc adm policy remove-scc-from-user privileged -z {{ test_sa }} -n {{ app_ci_namespace }}
          changed_when: true

        - name: Delete service account
          ansible.builtin.debug:
            msg: "Deleting service account..."

        - name: Delete test service account
          ansible.builtin.shell: |
            oc delete sa {{ test_sa }} -n {{ app_ci_namespace }}
          changed_when: true

        - name: Display cleanup complete
          ansible.builtin.debug:
            msg: "✓ Cleanup complete"

        - name: Image signing test complete
          ansible.builtin.debug:
            msg:
              - "========================================="
              - "RHTAS Image Signing Test Complete!"
              - "========================================="
              - ""
              - "Summary:"
              - "  ✓ Test service account created"
              - "  ✓ Tekton task executed successfully"
              - "  ✓ Image built and pushed to Quay"
              - "  ✓ Tekton Chains signed the image"
              - "  ✓ Cleanup completed"
              - ""
              - "========================================="
              - "Verify Signature in Quay Console"
              - "========================================="
              - ""
              - "To verify the signature:"
              - ""
              - "  1. Open the Quay Console tab in Showroom and log in"
              - ""
              - "  3. Navigate to: tssc/tekton-chains-test repository"
              - ""
              - "  4. Look for the image tag created by this task"
              - ""
              - "  5. Verify the SHIELD ICON appears next to the tag"
              - "     (This indicates a valid Cosign signature)"

