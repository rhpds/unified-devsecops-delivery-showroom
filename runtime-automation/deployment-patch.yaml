---
# Patch to add automation sidecar container to showroom deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: showroom
  namespace: REPLACE_WITH_YOUR_NAMESPACE
spec:
  template:
    spec:
      serviceAccountName: showroom
      containers:
      # Automation sidecar for solve and validate operations
      - name: automation
        image: quay.io/agnosticd/ee-multicloud:chained-2026-04-01
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
        command:
        - /bin/bash
        - -c
        - |
          # Create directory for Python libraries
          mkdir -p /tmp/pylibs

          # Check if runtime-automation exists
          if [ -d /repo/runtime-automation ]; then
            echo "Found runtime-automation folder"

            # Install Python packages from requirements.txt (if exists)
            /usr/local/bin/pip3 install --target=/tmp/pylibs -r /repo/runtime-automation/requirements.txt 2>/dev/null || true

            # DNF packages from packages.txt (running as root)
            PACKAGES=$(grep -v '^#' /repo/runtime-automation/packages.txt 2>/dev/null | grep '^[[:alnum:]]' | tr '\n' ' ' || true)
            if [ -n "$PACKAGES" ]; then
              echo "Installing DNF packages: $PACKAGES"
              dnf install -y $PACKAGES && dnf clean all
            fi

            # Add Python libraries to path
            export PYTHONPATH="/tmp/pylibs:${PYTHONPATH}"

            # Start API server
            if [ -f /repo/runtime-automation/api-server.py ]; then
              echo "Starting automation API server..."
              cd /repo/runtime-automation
              python3 api-server.py || sleep infinity
            else
              echo "⚠️  api-server.py not found"
              sleep infinity
            fi
          else
            echo "⚠️  runtime-automation folder not found - automation disabled"
            sleep infinity
          fi
        ports:
        - containerPort: 5000
          protocol: TCP
        env:
        - name: K8S_AUTH_KUBECONFIG
          value: /var/run/secrets/kubernetes.io/serviceaccount/token
        volumeMounts:
        - name: showroom-files
          mountPath: /repo
          subPath: repo
          readOnly: true
        - name: user-data
          mountPath: /user_data
          readOnly: true
