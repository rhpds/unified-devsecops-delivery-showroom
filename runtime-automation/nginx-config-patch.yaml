---
apiVersion: v1
kind: ConfigMap
metadata:
  name: showroom-proxy-config
  namespace: REPLACE_WITH_YOUR_NAMESPACE
data:
  nginx.conf: |
    #daemon off;
    events {
    }
    error_log /dev/stdout info;
    http {
      include /etc/nginx/mime.types;
      proxy_cache off;
      expires -1;
      proxy_cache_path /dev/null keys_zone=mycache:10m;

      map $http_upgrade $connection_upgrade {
          default upgrade;
          '' close;
      }

      server {
        listen 8080;

        absolute_redirect off;

        # Proxy API requests to solver sidecar (strip /api prefix)
        location /api/ {
          proxy_pass http://127.0.0.1:5000/;

          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # SSE support
          proxy_buffering off;
          proxy_cache off;
          proxy_read_timeout 3600s;
          proxy_connect_timeout 3600s;
          chunked_transfer_encoding off;
        }

        # Proxy WeTTY terminal requests
        location /wetty/ {
          proxy_pass http://127.0.0.1:8001/wetty/;

          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          proxy_buffering off;
          proxy_cache off;
          proxy_read_timeout 3600s;
        }

        # Default location for Showroom content
        location / {
          proxy_pass http://127.0.0.1:8000;

          expires off;
          proxy_cache off;
          proxy_pass_request_headers on;
          proxy_set_header Accept-Encoding "gzip";
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
