---
# Module 3: Developer Setup and Configuration
# Translates: solve-module-3.sh (exact implementation from scripts)
- name: Solve Module 03 - Developer Setup
  hosts: localhost
  gather_facts: false

  vars:
    # Variables from user_data.yml (injected via -e @/user_data/user_data.yml)
    cluster_domain: "{{ openshift_cluster_ingress_domain }}"
    developer_password: "{{ password }}"

    # Static variables
    keycloak_namespace: "tssc-keycloak"
    devspaces_namespace: "openshift-devspaces"
    app_ci_namespace: "tssc-app-ci"
    tas_namespace: "tssc-tas"
    tpa_namespace: "tssc-tpa"
    gitlab_namespace: "gitlab"
    sso_realm: "sso"
    tas_sso_client_id: "trusted-artifact-signer"
    developer_username: "user1"
    developer_email: user1@demo.redhat.com
    developer_firstname: "User1"
    developer_lastname: "Demo"
    lab_assets_dir: "/home/lab-user/lab-assets"

  module_defaults:
    group/kubernetes.core.k8s:
      host: "{{ openshift_api_server_url }}"
      api_key: "{{ (lookup('file', k8s_kubeconfig) | from_yaml).users[0].user.token }}"
      validate_certs: false

  tasks:
    - name: Add bastion host to inventory
      ansible.builtin.add_host:
        name: "bastion"
        ansible_host: "{{ bastion_public_hostname }}"
        ansible_user: "{{ bastion_ssh_user_name }}"
        ansible_ssh_pass: "{{ bastion_ssh_password }}"
        ansible_port: "{{ bastion_ssh_port }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Display module information
      ansible.builtin.debug:
        msg: "Solving Module 03: Developer Setup and Platform Configuration"

    ###########################################
    # STEP 1: Reset Module 3
    ###########################################
    - name: "STEP 1: Reset Module 3"
      block:
        - include_tasks: tasks/step-1-reset.yml

    ###########################################
    # STEP 2: Create Developer User
    ###########################################
    - name: "STEP 2: Create Developer User"
      block:
        - include_tasks: tasks/step-2-solve-create-developer-user.yml

    ###########################################
    # STEP 2: Update GitOps Backstage Config
    ###########################################
    - name: "STEP 2: Update GitOps Backstage Configuration"
      block:
        - include_tasks: tasks/step-2-solve-update-gitops-backstage-config.yml

    ###########################################
    # STEP 2: Update RHDH Devfile Config
    ###########################################
    - name: "STEP 2: Update RHDH Devfile Configuration"
      block:
        - include_tasks: tasks/step-2-solve-update-rhdh-devfile-config.yml

    ###########################################
    # STEP 2: Create Dev Spaces ConfigMap
    ###########################################
    - name: "STEP 2: Create Dev Spaces ConfigMap"
      block:
        - include_tasks: tasks/step-2-solve-create-devspaces-configmap.yml

    ###########################################
    # STEP 2: Create Pipeline Secrets
    ###########################################
    - name: "STEP 2: Create Pipeline Secrets"
      block:
        - include_tasks: tasks/step-2-solve-create-pipeline-secrets.yml

    ###########################################
    # Module Summary
    ###########################################
    - name: Module 3 completion summary
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "Module 3 Complete!"
          - "========================================="
          - "Summary:"
          - "  ✓ Developer user created in Keycloak"
          - "  ✓ User assigned to tssc and users groups"
          - "  ✓ Dev Spaces ConfigMap created with TAS URLs"
          - "  ✓ Pipeline secrets created:"
          - "    - tpa-secret (RHTPA authentication)"
          - "    - gitlab-auth-secret (GitLab authentication)"
          - "  ✓ GitOps backstage configuration updated"
          - "  ✓ RHDH devfile configuration updated"
          - ""
          - "The developer environment is now fully configured!"
