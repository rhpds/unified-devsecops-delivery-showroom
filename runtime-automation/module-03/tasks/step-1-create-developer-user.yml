---
# STEP 1: Create Developer User (create-developer-user.sh)
- name: Get Keycloak admin credentials for user creation
  ansible.builtin.shell:
    cmd: |
      ADMIN_USER=$(oc get secret keycloak-initial-admin -n {{ keycloak_namespace }} -o jsonpath='{.data.username}' | base64 -d)
      ADMIN_PASS=$(oc get secret keycloak-initial-admin -n {{ keycloak_namespace }} -o jsonpath='{.data.password}' | base64 -d)
      echo "${ADMIN_USER}:${ADMIN_PASS}"
  changed_when: false
  register: kc_create_creds

- name: Get Keycloak admin token for user creation
  ansible.builtin.shell:
    cmd: |
      ADMIN_USER=$(echo "{{ kc_create_creds.stdout }}" | cut -d: -f1)
      ADMIN_PASS=$(echo "{{ kc_create_creds.stdout }}" | cut -d: -f2)
      curl -s -X POST "{{ keycloak_admin_console }}/realms/master/protocol/openid-connect/token" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -d "client_id=admin-cli" \
        -d "username=${ADMIN_USER}" \
        -d "password=${ADMIN_PASS}" \
        -d "grant_type=password" | jq -r '.access_token'
  changed_when: false
  register: create_admin_token

- name: Verify admin token
  ansible.builtin.fail:
    msg: "Failed to authenticate with Keycloak"
  when: create_admin_token.stdout == "" or create_admin_token.stdout == "null"

- name: Check if developer user exists
  ansible.builtin.shell:
    cmd: |
      curl -s -H "Authorization: Bearer {{ create_admin_token.stdout }}" \
        "{{ keycloak_admin_console }}/admin/realms/{{ sso_realm }}/users?username={{ developer_username }}" | jq -r '.[0].id // empty'
  changed_when: false
  register: existing_user_id

- name: Create developer user
  when: existing_user_id.stdout == ""
  ansible.builtin.shell:
    cmd: |
      curl -s -X POST "{{ keycloak_admin_console }}/admin/realms/{{ sso_realm }}/users" \
        -H "Authorization: Bearer {{ create_admin_token.stdout }}" \
        -H "Content-Type: application/json" \
        -d "{
          \"username\": \"{{ developer_username }}\",
          \"email\": \"{{ developer_email }}\",
          \"firstName\": \"{{ developer_firstname }}\",
          \"lastName\": \"{{ developer_lastname }}\",
          \"emailVerified\": true,
          \"enabled\": true
        }"
  changed_when: true

- name: Wait for user creation
  when: existing_user_id.stdout == ""
  ansible.builtin.pause:
    seconds: 2

- name: Get user ID
  ansible.builtin.shell:
    cmd: |
      curl -s -H "Authorization: Bearer {{ create_admin_token.stdout }}" \
        "{{ keycloak_admin_console }}/admin/realms/{{ sso_realm }}/users?username={{ developer_username }}" | jq -r '.[0].id'
  changed_when: false
  register: user_id

- name: Verify user ID exists
  ansible.builtin.fail:
    msg: "Failed to get user ID"
  when: user_id.stdout == "" or user_id.stdout == "null"

- name: Get tssc group ID
  ansible.builtin.shell:
    cmd: |
      curl -s -H "Authorization: Bearer {{ create_admin_token.stdout }}" \
        "{{ keycloak_admin_console }}/admin/realms/{{ sso_realm }}/groups?search=tssc" | jq -r '.[0].id // empty'
  changed_when: false
  register: tssc_group_id

- name: Get users group ID
  ansible.builtin.shell:
    cmd: |
      curl -s -H "Authorization: Bearer {{ create_admin_token.stdout }}" \
        "{{ keycloak_admin_console }}/admin/realms/{{ sso_realm }}/groups?search=users" | jq -r '.[0].id // empty'
  changed_when: false
  register: users_group_id

- name: Check if user is member of tssc group
  when: tssc_group_id.stdout != ""
  ansible.builtin.shell:
    cmd: |
      curl -s -H "Authorization: Bearer {{ create_admin_token.stdout }}" \
        "{{ keycloak_admin_console }}/admin/realms/{{ sso_realm }}/users/{{ user_id.stdout }}/groups" | jq -r ".[] | select(.id==\"{{ tssc_group_id.stdout }}\") | .id"
  register: tssc_member_check
  changed_when: false

- name: Add user to tssc group
  when: tssc_group_id.stdout != "" and tssc_member_check.stdout == ""
  ansible.builtin.shell:
    cmd: |
      curl -s -X PUT "{{ keycloak_admin_console }}/admin/realms/{{ sso_realm }}/users/{{ user_id.stdout }}/groups/{{ tssc_group_id.stdout }}" \
        -H "Authorization: Bearer {{ create_admin_token.stdout }}"
  changed_when: true

- name: Check if user is member of users group
  when: users_group_id.stdout != ""
  ansible.builtin.shell:
    cmd: |
      curl -s -H "Authorization: Bearer {{ create_admin_token.stdout }}" \
        "{{ keycloak_admin_console }}/admin/realms/{{ sso_realm }}/users/{{ user_id.stdout }}/groups" | jq -r ".[] | select(.id==\"{{ users_group_id.stdout }}\") | .id"
  register: users_member_check
  changed_when: false

- name: Add user to users group
  when: users_group_id.stdout != "" and users_member_check.stdout == ""
  ansible.builtin.shell:
    cmd: |
      curl -s -X PUT "{{ keycloak_admin_console }}/admin/realms/{{ sso_realm }}/users/{{ user_id.stdout }}/groups/{{ users_group_id.stdout }}" \
        -H "Authorization: Bearer {{ create_admin_token.stdout }}"
  changed_when: true

- name: Set user password
  ansible.builtin.shell:
    cmd: |
      curl -s -X PUT "{{ keycloak_admin_console }}/admin/realms/{{ sso_realm }}/users/{{ user_id.stdout }}/reset-password" \
        -H "Authorization: Bearer {{ create_admin_token.stdout }}" \
        -H "Content-Type: application/json" \
        -d "{
          \"type\": \"password\",
          \"value\": \"{{ developer_password }}\",
          \"temporary\": false
        }"
  changed_when: true

- name: Developer user creation complete
  ansible.builtin.debug:
    msg: "✓ Developer user created: {{ developer_username }}"
