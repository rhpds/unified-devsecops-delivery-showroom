---
# STEP 2: Create Pipeline Secrets (create-pipeline-secrets.sh)
- name: Get TPA server URL from route
  ansible.builtin.shell:
    cmd: |
      oc get route -l app.kubernetes.io/component=server -n {{ tpa_namespace }} -o json | jq -r '.items[0].spec.host'
  changed_when: false
  register: tpa_server_host

- name: Verify TPA server URL
  ansible.builtin.fail:
    msg: "Failed to retrieve TPA server URL"
  when: tpa_server_host.stdout == "" or tpa_server_host.stdout == "null"

- name: Set TPA server URL
  ansible.builtin.set_fact:
    tpa_server_url: "https://{{ tpa_server_host.stdout }}"

- name: Create tpa-secret
  ansible.builtin.shell:
    cmd: |
      cat <<EOF | oc apply -n {{ app_ci_namespace }} -f -
      kind: Secret
      apiVersion: v1
      metadata:
        name: tpa-secret
      stringData:
        bombastic_api_url: {{ tpa_server_url }}
        oidc_client_id: cli
        oidc_client_secret: {{ tpa_cli_client_secret }}
        oidc_issuer_url: {{ keycloak_admin_console }}/realms/{{ tpa_realm }}
        supported_cyclonedx_version: "1.4"
      type: Opaque
      EOF
  changed_when: true

- name: Get GitLab personal access token
  ansible.builtin.shell:
    cmd: |
      oc get secret root-user-personal-token -n {{ gitlab_namespace }} -o jsonpath='{.data.token}' | base64 -d
  changed_when: false
  register: gitlab_token

- name: Verify GitLab token
  ansible.builtin.fail:
    msg: "Failed to retrieve GitLab token"
  when: gitlab_token.stdout == ""

- name: Create gitlab-auth-secret
  ansible.builtin.shell:
    cmd: |
      cat <<EOF | oc apply -n {{ app_ci_namespace }} -f -
      kind: Secret
      apiVersion: v1
      metadata:
        name: gitlab-auth-secret
      stringData:
        password: {{ gitlab_token.stdout }}
        username: oauth2
      type: kubernetes.io/basic-auth
      EOF
  changed_when: true

- name: Pipeline secrets created
  ansible.builtin.debug:
    msg:
      - "✓ Pipeline secrets created:"
      - "  - tpa-secret (RHTPA authentication)"
      - "  - gitlab-auth-secret (GitLab authentication)"
