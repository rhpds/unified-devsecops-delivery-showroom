---
# STEP 2: Update GitOps Backstage Config (update-gitops-backstage-config.sh)
- name: Update GitOps Backstage configuration
  ansible.builtin.shell:
    cmd: bash {{ lab_assets_dir }}/update-gitops-backstage-config.sh update
  changed_when: true
  delegate_to: bastion

- name: GitOps config update complete
  ansible.builtin.debug:
    msg: "✓ GitOps Backstage configuration updated"
